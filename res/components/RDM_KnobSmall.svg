  <circle cx="20" cy="20" r="13" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.4"/>
  <circle cx="20" cy="20" r="12.5" fill="#2f2f2f"/>
  <circle cx="20" cy="20" r="12.5" fill="url(#matte Small)" opacity="0.6"/>
  <circle cx="20" cy="20" r="12" fill="url(#rimSmall)" opacity="0.4"/>
  <circle cx="20" cy="20" r="12" fill="url(#shadowSmall)"/>
  <circle cx="20" cy="20" r="10" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
  
  <!-- Indicator line (smaller) -->
  <line x1="20" y1="7" x2="20" y2="2" stroke="#dc2626" stroke-width="1.2" stroke-linecap="round"/>
