<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <defs>
    <!-- Brushed aluminum texture gradient -->
    <linearGradient id="brushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="20%" style="stop-color:#ffffff;stop-opacity:0.04"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="80%" style="stop-color:#000000;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.18"/>
    </linearGradient>
    
    <!-- Rim light for depth -->
    <radialGradient id="rimLight" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Inset shadow -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.25"/>
    </radialGradient>
  </defs>
  
  <!-- Outer rim (dark aluminum) -->
  <circle cx="30" cy="30" r="21" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.6"/>
  
  <!-- Main surface (matte) -->
  <circle cx="30" cy="30" r="20.5" fill="#2f2f2f"/>
  <circle cx="30" cy="30" r="20.5" fill="url(#brushed)" opacity="0.85"/>
  
  <!-- Rim lighting -->
  <circle cx="30" cy="30" r="20" fill="url(#rimLight)" opacity="0.65"/>
  
  <!-- Inset shadow (depth) -->
  <circle cx="30" cy="30" r="20" fill="url(#shadow)"/>
  
  <!-- Center accent ring -->
  <circle cx="30" cy="30" r="16" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  
  <!-- Crimsons indicator line (rotates with parameter) -->
  <line x1="30" y1="11" x2="30" y2="5" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Reference tick marks -->
  <g stroke="#555" stroke-width="0.4" opacity="0.55" stroke-linecap="round">
    <line x1="30" y1="9" x2="30" y2="12.5"/>
    <line x1="42.5" y1="30" x2="46" y2="30"/>
    <line x1="30" y1="48" x2="30" y2="51.5"/>
    <line x1="14" y1="30" x2="17.5" y2="30"/>
  </g>
  
  <!-- Center touch point -->
  <circle cx="30" cy="30" r="1.2" fill="#444" opacity="0.4"/>
</svg>
