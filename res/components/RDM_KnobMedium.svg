<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- RDM_KnobMedium - 15mm Diameter -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50">
  <defs>
    <linearGradient id="matteMedium" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="25%" style="stop-color:#ffffff;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="75%" style="stop-color:#000000;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </linearGradient>
    <radialGradient id="rimMedium" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="shadowMedium" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </radialGradient>
  </defs>
  
  <circle cx="25" cy="25" r="17" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="25" cy="25" r="16.5" fill="#2f2f2f"/>
  <circle cx="25" cy="25" r="16.5" fill="url(#matteMedium)" opacity="0.7"/>
  <circle cx="25" cy="25" r="16" fill="url(#rimMedium)" opacity="0.5"/>
  <circle cx="25" cy="25" r="16" fill="url(#shadowMedium)"/>
  <circle cx="25" cy="25" r="13" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
  
  <!-- Indicator line (rotates with parameter) -->
  <line x1="25" y1="8" x2="25" y2="3" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Tick marks -->
  <g stroke="#555" stroke-width="0.35" opacity="0.4" stroke-linecap="round">
    <line x1="25" y1="6" x2="25" y2="9" />
    <line x1="36" y1="25" x2="40" y2="25" />
    <line x1="25" y1="44" x2="25" y2="41" />
    <line x1="14" y1="25" x2="10" y2="25" />
  </g>
</svg>
