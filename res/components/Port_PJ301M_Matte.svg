<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 35 35">
  <defs>
    <linearGradient id="portBrushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15"/>
    </linearGradient>
    <radialGradient id="portRim" cx="30%" cy="30%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Outer bezel (aluminum rim) -->
  <circle cx="17.5" cy="17.5" r="10.8" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.4"/>
  
  <!-- Port surface (matte) -->
  <circle cx="17.5" cy="17.5" r="10.3" fill="#3a3a3a"/>
  <circle cx="17.5" cy="17.5" r="10.3" fill="url(#portBrushed)" opacity="0.7"/>
  
  <!-- Rim light -->
  <circle cx="17.5" cy="17.5" r="10" fill="url(#portRim)" opacity="0.5"/>
  
  <!-- Port face (dark) -->
  <circle cx="17.5" cy="17.5" r="9.8" fill="#1a1a1a"/>
  
  <!-- Jack hole -->
  <circle cx="17.5" cy="17.5" r="4.2" fill="#0a0a0a"/>
  
  <!-- Hole highlight (subtle depth) -->
  <circle cx="16.5" cy="15.5" r="1.3" fill="#ffffff" opacity="0.08"/>
</svg>
