<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  Red Dot Modular - Component Assets Library
  Matte Metallic Aesthetic (Brushed Aluminum + Crimson Accents)
  
  All components designed to be scalable SVG symbols
  Use with <use xlink:href="#knobLarge"/> etc. in widget code
-->

<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 200 400">
  <defs>
    <!-- Matte Aluminum Gradient (subtle brushed effect) -->
    <linearGradient id="matteBrushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12" />
      <stop offset="25%" style="stop-color:#ffffff;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="75%" style="stop-color:#000000;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15" />
    </linearGradient>
    
    <!-- Radial gradient for depth (rim lighting) -->
    <radialGradient id="rimLight" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Dark shadow for depth -->
    <radialGradient id="insetShadow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </radialGradient>
  </defs>

  <!-- ============================================================================
       KNOB LARGE (21mm diameter, 18-21mm physical)
       ============================================================================ -->
  
  <g id="knobLarge">
    <!-- Outer barrel/rim (matte aluminum) -->
    <circle cx="30" cy="30" r="21" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.5"/>
    
    <!-- Matte brushed surface -->
    <circle cx="30" cy="30" r="20.5" fill="#2f2f2f"/>
    <circle cx="30" cy="30" r="20.5" fill="url(#matteBrushed)" opacity="0.8"/>
    
    <!-- Rim light (subtle highlight) -->
    <circle cx="30" cy="30" r="20" fill="url(#rimLight)" opacity="0.6"/>
    
    <!-- Inset shadow (depth) -->
    <circle cx="30" cy="30" r="20" fill="url(#insetShadow)"/>
    
    <!-- Center accent ring -->
    <circle cx="30" cy="30" r="16" fill="none" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <!-- Indicator line (crimson) -->
    <line x1="30" y1="11" x2="30" y2="5" stroke="#dc2626" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Tick marks (subtle) -->
    <g stroke="#555" stroke-width="0.3" opacity="0.5">
      <line x1="30" y1="9" x2="30" y2="12" />
      <line x1="42" y1="30" x2="45" y2="30" />
      <line x1="30" y1="51" x2="30" y2="48" />
      <line x1="18" y1="30" x2="15" y2="30" />
    </g>
  </g>

  <!-- ============================================================================
       KNOB MEDIUM (17mm diameter, 14-17mm physical)
       ============================================================================ -->
  
  <g id="knobMedium">
    <!-- Outer barrel -->
    <circle cx="30" cy="110" r="17" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.4"/>
    
    <!-- Matte surface -->
    <circle cx="30" cy="110" r="16.5" fill="#2f2f2f"/>
    <circle cx="30" cy="110" r="16.5" fill="url(#matteBrushed)" opacity="0.7"/>
    
    <!-- Rim light -->
    <circle cx="30" cy="110" r="16" fill="url(#rimLight)" opacity="0.5"/>
    
    <!-- Inset shadow -->
    <circle cx="30" cy="110" r="16" fill="url(#insetShadow)"/>
    
    <!-- Center ring -->
    <circle cx="30" cy="110" r="13" fill="none" stroke="#1a1a1a" stroke-width="0.3"/>
    
    <!-- Indicator line (crimson) -->
    <line x1="30" y1="93" x2="30" y2="88" stroke="#dc2626" stroke-width="1.2" stroke-linecap="round"/>
    
    <!-- Tick marks -->
    <g stroke="#555" stroke-width="0.25" opacity="0.4">
      <line x1="30" y1="91" x2="30" y2="94" />
      <line x1="39" y1="110" x2="43" y2="110" />
      <line x1="30" y1="127" x2="30" y2="124" />
      <line x1="21" y1="110" x2="17" y2="110" />
    </g>
  </g>

  <!-- ============================================================================
       KNOB SMALL (13mm diameter, 10-13mm physical)
       ============================================================================ -->
  
  <g id="knobSmall">
    <!-- Outer barrel -->
    <circle cx="30" cy="190" r="13" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.3"/>
    
    <!-- Matte surface -->
    <circle cx="30" cy="190" r="12.5" fill="#2f2f2f"/>
    <circle cx="30" cy="190" r="12.5" fill="url(#matteBrushed)" opacity="0.6"/>
    
    <!-- Rim light -->
    <circle cx="30" cy="190" r="12" fill="url(#rimLight)" opacity="0.4"/>
    
    <!-- Inset shadow -->
    <circle cx="30" cy="190" r="12" fill="url(#insetShadow)"/>
    
    <!-- Center ring -->
    <circle cx="30" cy="190" r="10" fill="none" stroke="#1a1a1a" stroke-width="0.25"/>
    
    <!-- Indicator line (crimson, smaller) -->
    <line x1="30" y1="176" x2="30" y2="172" stroke="#dc2626" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- ============================================================================
       PORT/JACK (PJ301M style, 10.5mm diameter)
       ============================================================================ -->
  
  <g id="portJack">
    <!-- Outer barrel (aluminum) -->
    <circle cx="30" cy="270" r="10.5" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.4"/>
    
    <!-- Matte finish -->
    <circle cx="30" cy="270" r="10" fill="#3a3a3a"/>
    <circle cx="30" cy="270" r="10" fill="url(#matteBrushed)" opacity="0.6"/>
    
    <!-- Rim highlight -->
    <circle cx="30" cy="270" r="9.8" fill="url(#rimLight)" opacity="0.4"/>
    
    <!-- Port face (dark) -->
    <circle cx="30" cy="270" r="9.5" fill="#1a1a1a"/>
    
    <!-- Center hole (connection point) -->
    <circle cx="30" cy="270" r="4" fill="#000000" opacity="0.8"/>
    <circle cx="30" cy="270" r="3.8" fill="#0a0a0a"/>
    
    <!-- Subtle highlight on hole -->
    <circle cx="29" cy="268" r="1.2" fill="#ffffff" opacity="0.1"/>
  </g>

  <!-- ============================================================================
       BUTTON - PUSH (10mm diameter)
       ============================================================================ -->
  
  <g id="buttonPush">
    <!-- Outer bezel -->
    <circle cx="30" cy="340" r="10" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="0.4"/>
    
    <!-- Button surface (domed) -->
    <ellipse cx="30" cy="340" rx="9.5" ry="9" fill="#3a3a3a"/>
    <ellipse cx="30" cy="340" rx="9.5" ry="9" fill="url(#matteBrushed)" opacity="0.7"/>
    
    <!-- Dome highlight -->
    <ellipse cx="30" cy="337" rx="6" ry="4" fill="#ffffff" opacity="0.15"/>
    
    <!-- Inset shadow (pressed effect) -->
    <circle cx="30" cy="340" r="8.5" fill="url(#insetShadow)" opacity="0.3"/>
  </g>

  <!-- ============================================================================
       BUTTON - TOGGLE (14mm × 8mm)
       ============================================================================ -->
  
  <g id="buttonToggle">
    <!-- Bezel -->
    <rect x="60" y="335" width="14" height="8" rx="1" fill="#2a2a2a" stroke="#1a1a1a" stroke-width="0.3"/>
    
    <!-- Face -->
    <rect x="60.5" y="335.5" width="13" height="7" rx="0.8" fill="#3a3a3a"/>
    <rect x="60.5" y="335.5" width="13" height="7" rx="0.8" fill="url(#matteBrushed)" opacity="0.6"/>
    
    <!-- Highlight -->
    <rect x="60.5" y="335.5" width="13" height="3" rx="0.5" fill="#ffffff" opacity="0.1"/>
  </g>

  <!-- ============================================================================
       LIGHT INDICATOR - SMALL (5mm diameter)
       ============================================================================ -->
  
  <g id="lightSmall">
    <!-- Bezel -->
    <circle cx="30" cy="30" r="5" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="0.3"/>
    
    <!-- Lens (dark when off) -->
    <circle cx="30" cy="30" r="4.5" fill="#0a0a0a"/>
    
    <!-- Rim highlight -->
    <circle cx="29" cy="28" r="1.5" fill="#ffffff" opacity="0.12"/>
  </g>

  <!-- ============================================================================
       LIGHT INDICATOR - MEDIUM (7mm diameter)
       ============================================================================ -->
  
  <g id="lightMedium">
    <!-- Bezel -->
    <circle cx="50" cy="30" r="7" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="0.4"/>
    
    <!-- Lens -->
    <circle cx="50" cy="30" r="6.5" fill="#0a0a0a"/>
    
    <!-- Rim highlight -->
    <circle cx="49" cy="27" r="2" fill="#ffffff" opacity="0.12"/>
  </g>

  <!-- ============================================================================
       SLIDER - VERTICAL (6mm wide × 40mm tall, typical range)
       ============================================================================ -->
  
  <g id="sliderVertical">
    <!-- Track (background) -->
    <rect x="27" y="250" width="6" height="40" rx="3" fill="#1a1a1a" stroke="#0a0a0a" stroke-width="0.3"/>
    
    <!-- Track fill (subtle gradient showing position) -->
    <rect x="27" y="250" width="6" height="20" rx="3" fill="#dc2626" opacity="0.3"/>
    
    <!-- Slider handle (at 50% position) -->
    <g id="sliderHandle">
      <rect x="24" y="267" width="12" height="6" rx="1" fill="#3a3a3a" stroke="#2a2a2a" stroke-width="0.3"/>
      <rect x="24.5" y="267.5" width="11" height="5" rx="0.8" fill="#2f2f2f"/>
      <rect x="24.5" y="267.5" width="11" height="5" rx="0.8" fill="url(#matteBrushed)" opacity="0.5"/>
      
      <!-- Handle highlight -->
      <rect x="24.5" y="267.5" width="11" height="2" rx="0.5" fill="#ffffff" opacity="0.08"/>
    </g>
  </g>

  <!-- ============================================================================
       DESIGN NOTES
       ============================================================================ -->
  
  <text x="100" y="30" font-size="7" font-family="monospace" fill="#666">
    Knobs: Matte #3a3a3a + #2f2f2f + brushed gradient
  </text>
  <text x="100" y="45" font-size="7" font-family="monospace" fill="#666">
    Indicator: Crimson #dc2626 (always on top)
  </text>
  <text x="100" y="60" font-size="7" font-family="monospace" fill="#666">
    Lighting: Rim light + inset shadow (depth)
  </text>
  <text x="100" y="75" font-size="7" font-family="monospace" fill="#666">
    All: Scalable to any module width
  </text>
  
  <text x="100" y="120" font-size="6" font-family="monospace" fill="#999">
    For C++ widget integration:
  </text>
  <text x="100" y="133" font-size="6" font-family="monospace" fill="#999">
    1. Export knobs as separate assets (Large/Med/Small)
  </text>
  <text x="100" y="146" font-size="6" font-family="monospace" fill="#999">
    2. Use in widget: RDM_KnobLarge, RDM_KnobMedium, RDM_KnobSmall
  </text>
  <text x="100" y="159" font-size="6" font-family="monospace" fill="#999">
    3. Rotation indicator line rotates with knob (engine drives rotation)
  </text>
  <text x="100" y="172" font-size="6" font-family="monospace" fill="#999">
    4. For lights: glow effect rendered by C++ (addLight), SVG shows off state
  </text>
</svg>
