<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="9.2mm" height="9.2mm"
     viewBox="-4.600 -4.600 9.200 9.200">
<defs>
  <radialGradient id="ledBody" cx="38%" cy="32%" r="62%">
    <stop offset="0%"   stop-color="white" stop-opacity="0.6"/>
    <stop offset="40%"  stop-color="#ffaa00" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#ffaa00" stop-opacity="0.7"/>
  </radialGradient>
  <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#ffaa00" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#ffaa00" stop-opacity="0"/>
  </radialGradient>
  <filter id="ledBloom" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="1.28" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>
<circle r="3.520" fill="url(#ledGlow)"/>
<circle r="1.600" fill="#ffaa00" opacity="0.4" filter="url(#ledBloom)"/>
<circle r="1.600" fill="url(#ledBody)"/>
<circle r="1.600" fill="none" stroke="#ffaa00" stroke-width="0.3" opacity="0.5"/>
<circle cx="-0.448" cy="-0.480" r="0.512" fill="white" opacity="0.45"/>
<circle cx="-0.320" cy="-0.352" r="0.192" fill="white" opacity="0.7"/>
</svg>