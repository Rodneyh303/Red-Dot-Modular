<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="11.0mm" height="11.0mm"
     viewBox="-5.500 -5.500 11.000 11.000">
<defs>
  <radialGradient id="ledBody" cx="38%" cy="32%" r="62%">
    <stop offset="0%"   stop-color="white" stop-opacity="0.6"/>
    <stop offset="40%"  stop-color="#22dd55" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#22dd55" stop-opacity="0.7"/>
  </radialGradient>
  <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#22dd55" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="#22dd55" stop-opacity="0"/>
  </radialGradient>
  <filter id="ledBloom" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="2.00" result="blur"/>
    <feComposite in="SourceGraphic" in2="blur" operator="over"/>
  </filter>
</defs>
<circle r="5.500" fill="url(#ledGlow)"/>
<circle r="2.500" fill="#22dd55" opacity="0.4" filter="url(#ledBloom)"/>
<circle r="2.500" fill="url(#ledBody)"/>
<circle r="2.500" fill="none" stroke="#22dd55" stroke-width="0.3" opacity="0.5"/>
<circle cx="-0.700" cy="-0.750" r="0.800" fill="white" opacity="0.45"/>
<circle cx="-0.500" cy="-0.550" r="0.300" fill="white" opacity="0.7"/>
</svg>