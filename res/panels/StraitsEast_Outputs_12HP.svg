<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60.96 380">
  <rect width="60.96" height="380" fill="#e6e6e6"/>
  <rect x="0.5" y="0.5" width="59.96" height="379" fill="none" stroke="#ccc" stroke-width="0.8"/>
  
  <!-- RED LINE (LEFT EDGE) - Separates East from rest -->
  <rect x="0" y="0" width="2" height="380" fill="#dc2626"/>
  
  <!-- HEADER -->
  <rect x="0" y="0" width="60.96" height="16" fill="#d0d0d0"/>
  <text x="30.48" y="13" font-size="7" font-family="monospace" text-anchor="middle" fill="#333" font-weight="bold">STRAITS</text>
  <text x="30.48" y="25" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">east | 2-8</text>
  
  <!-- VOICE OUTPUTS (7 voices: 2-8) -->
  <text x="10" y="45" font-size="5" font-family="monospace" fill="#777" font-weight="bold">voices</text>
  <line x1="4" y1="50" x2="56.96" y2="50" stroke="#d0d0d0" stroke-width="0.5"/>
  
  <!-- Voice 2 -->
  <text x="10" y="70" font-size="4" font-family="monospace" fill="#888">2</text>
  <circle cx="25" cy="65" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <circle cx="38" cy="65" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <circle cx="50" cy="65" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  
  <!-- Voice 3 -->
  <text x="10" y="100" font-size="4" font-family="monospace" fill="#888">3</text>
  <circle cx="25" cy="95" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <circle cx="38" cy="95" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <circle cx="50" cy="95" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  
  <!-- Voice 4 -->
  <text x="10" y="130" font-size="4" font-family="monospace" fill="#888">4</text>
  <circle cx="25" cy="125" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <circle cx="38" cy="125" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <circle cx="50" cy="125" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  
  <!-- Voice 5-8 (abbreviated) -->
  <text x="10" y="160" font-size="4" font-family="monospace" fill="#888">5-8</text>
  <text x="30.48" y="160" font-size="3" font-family="monospace" text-anchor="middle" fill="#aaa">[↓]</text>
  
  <!-- OUTPUT LABELS -->
  <text x="25" y="310" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">g</text>
  <text x="38" y="310" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">cv</text>
  <text x="50" y="310" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">acc</text>
  
</svg>
