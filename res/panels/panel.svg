<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="168.5mm" height="128.5mm" viewBox="0 0 168.5 128.5" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Brushed metal texture -->
    <linearGradient id="metalGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e4e4e4"/>
      <stop offset="50%" stop-color="#d4d4d4"/>
      <stop offset="100%" stop-color="#e4e4e4"/>
    </linearGradient>
    <radialGradient id="etchedRing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-0.1" y="-0.1" width="1.2" height="1.2">
      <feDropShadow dx="0" dy="0.5" stdDeviation="0.6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="168.5" height="128.5" fill="url(#metalGrad)"/>

  <!-- Branding strip -->
  <rect x="0" y="0" width="168.5" height="8" fill="#c62828"/>
  <text x="84.25" y="6" font-family="Eurostile, Inter, sans-serif" font-size="4.2" fill="#fff" text-anchor="middle">Red Dot Modular — MeloDicer</text>

  <!-- Top knobs -->
  <text x="14" y="40" text-anchor="middle" font-size="3.8" font-family="Eurostile, sans-serif" fill="#222">NOTE</text>
  <text x="42" y="40" text-anchor="middle" font-size="3.8" font-family="Eurostile, sans-serif" fill="#222">VAR</text>
  <text x="70" y="40" text-anchor="middle" font-size="3.8" font-family="Eurostile, sans-serif" fill="#222">LEG</text>
  <text x="98" y="40" text-anchor="middle" font-size="3.8" font-family="Eurostile, sans-serif" fill="#222">REST</text>

  <!-- Semitone labels -->
  <g font-family="Eurostile, sans-serif" font-size="3.0" fill="#111">
    <text x="10" y="46">C</text><text x="18" y="46">C#</text><text x="26" y="46">D</text>
    <text x="34" y="46">D#</text><text x="42" y="46">E</text><text x="50" y="46">F</text>
    <text x="58" y="46">F#</text><text x="66" y="46">G</text><text x="74" y="46">G#</text>
    <text x="82" y="46">A</text><text x="90" y="46">A#</text><text x="98" y="46">B</text>
  </g>

  <!-- Semitone numeric labels -->
  <g font-family="Eurostile, sans-serif" font-size="3.0" fill="#444">
    <text x="10" y="86">1</text><text x="18" y="86">2</text><text x="26" y="86">3</text>
    <text x="34" y="86">4</text><text x="42" y="86">5</text><text x="50" y="86">6</text>
    <text x="58" y="86">7</text><text x="66" y="86">8</text><text x="74" y="86">9</text>
    <text x="82" y="86">10</text><text x="90" y="86">11</text><text x="98" y="86">12</text>
  </g>

  <!-- Octave sliders -->
  <text x="114" y="86" font-size="3.2" font-family="Eurostile, sans-serif" fill="#006064">OCT LO</text>
  <text x="126" y="86" font-size="3.2" font-family="Eurostile, sans-serif" fill="#006064">OCT HI</text>

  <!-- Pattern ring -->
  <circle cx="130" cy="28" r="12" stroke="#888" stroke-width="0.6" fill="url(#etchedRing)" filter="url(#shadow)"/>
  <!-- Tick marks -->
  <g stroke="#aaa" stroke-width="0.3">
    <line x1="130" y1="16" x2="130" y2="14"/>
    <line x1="142" y1="28" x2="144" y2="28"/>
    <line x1="130" y1="40" x2="130" y2="42"/>
    <line x1="118" y1="28" x2="116" y2="28"/>
  </g>

  <!-- Pattern knobs -->
  <text x="12" y="110" font-size="3.0" font-family="Eurostile, sans-serif" text-anchor="middle">LEN</text>
  <text x="28" y="110" font-size="3.0" font-family="Eurostile, sans-serif" text-anchor="middle">OFF</text>

  <!-- Dice / Lock / Mute -->
  <text x="128" y="120" font-size="3.0" fill="#c62828" font-family="Eurostile, sans-serif" text-anchor="middle">DICE R</text>
  <text x="140" y="120" font-size="3.0" fill="#c62828" font-family="Eurostile, sans-serif" text-anchor="middle">DICE M</text>
  <text x="128" y="110" font-size="3.0" fill="#444" font-family="Eurostile, sans-serif" text-anchor="middle">LOCK</text>
  <text x="140" y="110" font-size="3.0" fill="#444" font-family="Eurostile, sans-serif" text-anchor="middle">MUTE</text>

  <!-- Mode buttons -->
  <g font-family="Eurostile, sans-serif" font-size="3.0" fill="#111" text-anchor="middle">
    <text x="150" y="68">A</text>
    <text x="150" y="78">B</text>
    <text x="150" y="88">C</text>
    <text x="150" y="98">D</text>
  </g>

  <!-- I/O labels -->
  <g font-family="Eurostile, sans-serif" font-size="3.0" fill="#222" text-anchor="middle">
    <text x="12" y="120">CLK</text>
    <text x="28" y="120">G1</text>
    <text x="44" y="120">G2</text>
    <text x="60" y="120">CV1</text>
    <text x="76" y="120">CV2</text>
    <text x="44" y="110">RST</text>
    <text x="60" y="110">SEED</text>
    <text x="72" y="110">GATE</text>
    <text x="84" y="110">CV</text>
    <text x="96" y="110">SEED OUT</text>
  </g>
</svg>
