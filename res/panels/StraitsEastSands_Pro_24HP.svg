<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 121.92 380" width="121.92mm" height="380mm">
  <defs>
    <!-- ===== GRAIN/TEXTURE OVERLAY ===== -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    
    <pattern id="grainTexture" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#1a1a1a"/>
      <rect width="100" height="100" fill="url(#grainNoise)" opacity="0.03"/>
    </pattern>
    
    <filter id="grainNoise">
      <feTurbulence type="fractalNoise" baseFrequency="2" numOctaves="4" result="noise"/>
    </filter>
    
    <!-- ===== PANEL BRUSHED METAL EFFECT ===== -->
    <linearGradient id="panelBrush" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08"/>
    </linearGradient>
    
    <!-- ===== KNOB GRADIENTS (Medium/Small sizes for East) ===== -->
    
    <!-- Medium Knob - 5mm radius (Length knobs) -->
    <radialGradient id="knobMed" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#e8d4a8;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#c4a57b;stop-opacity:1"/>
      <stop offset="55%" style="stop-color:#8b6f47;stop-opacity:1"/>
      <stop offset="90%" style="stop-color:#4a3520;stop-opacity:1"/>
    </radialGradient>
    
    <!-- Small Knob - 4mm radius (Offset/Rotation knobs) -->
    <radialGradient id="knobSm" cx="35%" cy="35%" r="65%">
      <stop offset="0%" style="stop-color:#dcc89f;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#b8935e;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#7a5c2d;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a2410;stop-opacity:1"/>
    </radialGradient>
    
    <!-- ===== JACK GRADIENT ===== -->
    <radialGradient id="jack" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#d8d8d8;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#a8a8a8;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#505050;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </radialGradient>
    
    <!-- ===== BUTTON GRADIENT ===== -->
    <radialGradient id="button" cx="45%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#f0f0f0;stop-opacity:1"/>
      <stop offset="25%" style="stop-color:#c0c0c0;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#606060;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </radialGradient>
  </defs>
  
  <!-- ===== PANEL BACKGROUND ===== -->
  <rect width="121.92" height="380" fill="#1a1a1a"/>
  <rect width="121.92" height="380" fill="url(#panelBrush)"/>
  
  <!-- ===== PANEL BORDER ===== -->
  <rect x="0.5" y="0.5" width="120.92" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- ===== RED LINE ACCENT (LEFT EDGE - East marker) ===== -->
  <rect x="0" y="0" width="2.5" height="380" fill="#dc2626"/>
  <rect x="0" y="0" width="2.5" height="380" fill="#ff4444" opacity="0.3"/>
  
  <!-- ===== HEADER AREA ===== -->
  <rect x="0" y="0" width="121.92" height="16" fill="#141414"/>
  <line x1="2" y1="16" x2="119.92" y2="16" stroke="#2a2a2a" stroke-width="0.5"/>
  
  <!-- RED DOT BRANDING (Metallic) -->
  <circle cx="12" cy="8" r="3.5" fill="#cc2222" stroke="#990000" stroke-width="0.3"/>
  <circle cx="10.5" cy="6.5" r="1.2" fill="#ff6666" opacity="0.6"/>
  
  <!-- TITLE -->
  <text x="60.96" y="13" font-size="7.5" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">STRAITS EAST SANDS</text>
  
  <!-- ===== COLUMN HEADERS ===== -->
  <text x="20" y="35" font-size="5.5" font-family="monospace" fill="#b8860b" font-weight="bold">REST</text>
  <text x="54" y="35" font-size="5.5" font-family="monospace" fill="#b8860b" font-weight="bold">MELODY</text>
  <text x="88" y="35" font-size="5.5" font-family="monospace" fill="#b8860b" font-weight="bold">OCTAVE</text>
  
  <!-- Sub-headers (L/O/R) -->
  <text x="10" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">L</text>
  <text x="20" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">O</text>
  <text x="30" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">R</text>
  
  <text x="44" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">L</text>
  <text x="54" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">O</text>
  <text x="64" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">R</text>
  
  <text x="78" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">L</text>
  <text x="88" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">O</text>
  <text x="98" y="43" font-size="4" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">R</text>
  
  <!-- ===== VOICE 2 ROW (Y=60) ===== -->
  <text x="5" y="63" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">2</text>
  
  <!-- Voice 2: Rest DNA (Length, Offset, Rotation) -->
  <g transform="translate(10, 60)">
    <circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/>
    <rect x="-0.6" y="-5.8" width="1.2" height="2.2" rx="0.3" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.5" cy="-1.5" r="1.2" fill="#ffffff" opacity="0.2"/>
  </g>
  <g transform="translate(20, 60)">
    <circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/>
    <rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="0.9" fill="#ffffff" opacity="0.2"/>
  </g>
  <g transform="translate(30, 60)">
    <circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/>
    <rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="0.9" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- Voice 2: Melody DNA (Length, Offset, Rotation) -->
  <g transform="translate(44, 60)">
    <circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/>
    <rect x="-0.6" y="-5.8" width="1.2" height="2.2" rx="0.3" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.5" cy="-1.5" r="1.2" fill="#ffffff" opacity="0.2"/>
  </g>
  <g transform="translate(54, 60)">
    <circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/>
    <rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="0.9" fill="#ffffff" opacity="0.2"/>
  </g>
  <g transform="translate(64, 60)">
    <circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/>
    <rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="0.9" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- Voice 2: Octave DNA (Length, Offset, Rotation) -->
  <g transform="translate(78, 60)">
    <circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/>
    <rect x="-0.6" y="-5.8" width="1.2" height="2.2" rx="0.3" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.5" cy="-1.5" r="1.2" fill="#ffffff" opacity="0.2"/>
  </g>
  <g transform="translate(88, 60)">
    <circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/>
    <rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="0.9" fill="#ffffff" opacity="0.2"/>
  </g>
  <g transform="translate(98, 60)">
    <circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/>
    <rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/>
    <circle cx="-1.2" cy="-1.2" r="0.9" fill="#ffffff" opacity="0.2"/>
  </g>
  
  <!-- ===== REPEAT PATTERN FOR VOICES 3-8 (abbreviated for brevity - template for all 7 voices) ===== -->
  <!-- In actual implementation, generate via script or copy pattern -->
  <!-- Voices 3,4,5,6,7,8 follow same pattern with Y values: 90, 120, 150, 180, 210, 240 -->
  
  <!-- Voice 3 (Y=90) -->
  <text x="5" y="93" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">3</text>
  <g transform="translate(10, 90)"><circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/><rect x="-0.6" y="-5.8" width="1.2" height="2.2" rx="0.3" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(20, 90)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/><rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(30, 90)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/><rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(44, 90)"><circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/><rect x="-0.6" y="-5.8" width="1.2" height="2.2" rx="0.3" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(54, 90)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/><rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(64, 90)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/><rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(78, 90)"><circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/><rect x="-0.6" y="-5.8" width="1.2" height="2.2" rx="0.3" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(88, 90)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/><rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/></g>
  <g transform="translate(98, 90)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/><rect x="-0.5" y="-4.6" width="1" height="1.8" rx="0.2" fill="#f5f5f5" opacity="0.9"/></g>
  
  <!-- Voice 4 (Y=120) through Voice 8 (Y=240) - ABBREVIATED -->
  <!-- Pattern repeats: voice number label + 9 knobs (3×3 grid) -->
  <!-- Y offsets: 120, 150, 180, 210, 240 -->
  
  <text x="5" y="123" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">4</text>
  <g transform="translate(10, 120)"><circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/></g>
  <g transform="translate(20, 120)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/></g>
  <g transform="translate(30, 120)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/></g>
  <g transform="translate(44, 120)"><circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/></g>
  <g transform="translate(54, 120)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/></g>
  <g transform="translate(64, 120)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/></g>
  <g transform="translate(78, 120)"><circle cx="0" cy="0" r="5" fill="url(#knobMed)" stroke="#0a0a0a" stroke-width="0.3"/></g>
  <g transform="translate(88, 120)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/></g>
  <g transform="translate(98, 120)"><circle cx="0" cy="0" r="4" fill="url(#knobSm)" stroke="#0a0a0a" stroke-width="0.25"/></g>
  
  <!-- Voices 5, 6, 7, 8 - compact representation (full details omitted, coordinates only) -->
  <text x="5" y="153" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">5</text>
  <!-- Knobs at Y=150: same pattern as voice 4 -->
  
  <text x="5" y="183" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">6</text>
  <!-- Knobs at Y=180 -->
  
  <text x="5" y="213" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">7</text>
  <!-- Knobs at Y=210 -->
  
  <text x="5" y="243" font-size="4" font-family="monospace" fill="#cc2222" font-weight="bold">8</text>
  <!-- Knobs at Y=240 -->
  
  <!-- ===== SEPARATOR LINE ===== -->
  <line x1="4" y1="280" x2="117.92" y2="280" stroke="#2a2a2a" stroke-width="0.8"/>
  
  <!-- ===== BUTTONS SECTION ===== -->
  <text x="20" y="300" font-size="5" font-family="monospace" fill="#b8860b" font-weight="bold">CONTROLS</text>
  
  <!-- Scramble Button -->
  <g transform="translate(25, 315)">
    <rect x="-8" y="-4" width="16" height="8" rx="1.5" fill="url(#button)" stroke="#0a0a0a" stroke-width="0.3"/>
    <rect x="-7.5" y="-3.5" width="15" height="3.5" rx="1" fill="#ffffff" opacity="0.1"/>
    <text x="0" y="1.5" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#ddd" font-weight="bold">SCR</text>
  </g>
  
  <!-- Reset Button -->
  <g transform="translate(60, 315)">
    <rect x="-8" y="-4" width="16" height="8" rx="1.5" fill="url(#button)" stroke="#0a0a0a" stroke-width="0.3"/>
    <rect x="-7.5" y="-3.5" width="15" height="3.5" rx="1" fill="#ffffff" opacity="0.1"/>
    <text x="0" y="1.5" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#ddd" font-weight="bold">RST</text>
  </g>
  
  <!-- All Button -->
  <g transform="translate(95, 315)">
    <rect x="-8" y="-4" width="16" height="8" rx="1.5" fill="url(#button)" stroke="#0a0a0a" stroke-width="0.3"/>
    <rect x="-7.5" y="-3.5" width="15" height="3.5" rx="1" fill="#ffffff" opacity="0.1"/>
    <text x="0" y="1.5" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#ddd" font-weight="bold">ALL</text>
  </g>
  
  <!-- ===== INPUTS SECTION ===== -->
  <line x1="4" y1="350" x2="117.92" y2="350" stroke="#2a2a2a" stroke-width="0.8"/>
  
  <text x="20" y="365" font-size="5" font-family="monospace" fill="#b8860b" font-weight="bold">INPUTS</text>
  
  <!-- Scramble Input Jack -->
  <g transform="translate(25, 375)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jack)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
    <circle cx="-1" cy="-1" r="0.8" fill="#ffffff" opacity="0.25"/>
  </g>
  
  <!-- Reset Input Jack -->
  <g transform="translate(60, 375)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jack)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
    <circle cx="-1" cy="-1" r="0.8" fill="#ffffff" opacity="0.25"/>
  </g>
  
  <!-- ===== FOOTER ===== -->
  <text x="60.96" y="378" font-size="3" font-family="monospace" text-anchor="middle" fill="#555">straits east sands | 24 hp</text>
  
</svg>
