<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 121.92 380" width="121.92mm" height="380mm">
  <defs>
    <linearGradient id="brushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="50%"  style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="121.92" height="380" fill="#1a1a1a"/>
  <rect x="0.5" y="0.5" width="120.92" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  <!-- Red left accent (East) -->
  <rect x="0" y="0" width="2" height="380" fill="#dc2626"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="121.92" height="16" fill="#141414"/>
  <line x1="2" y1="16" x2="119.92" y2="16" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="12" cy="8" r="3.5" fill="#dc2626"/>
  <text x="60.96" y="13" font-size="7.5" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">EAST SANDS VISUAL</text>

  <!-- VOICE TABS ZONE (Y=18mm H=12mm) — 7 tabs V2–V8 -->
  <text x="4" y="21" font-size="3" font-family="monospace" fill="#555">VOICE</text>
  <!-- Tab outlines: each tab ~15mm wide, 1mm gap, starting at X=4mm -->
  <g fill="none" stroke="#444" stroke-width="0.5">
    <rect x="4"   y="22" width="14" height="8" rx="1"/>  <!-- V2 -->
    <rect x="19"  y="22" width="14" height="8" rx="1"/>  <!-- V3 -->
    <rect x="34"  y="22" width="14" height="8" rx="1"/>  <!-- V4 -->
    <rect x="49"  y="22" width="14" height="8" rx="1"/>  <!-- V5 -->
    <rect x="64"  y="22" width="14" height="8" rx="1"/>  <!-- V6 -->
    <rect x="79"  y="22" width="14" height="8" rx="1"/>  <!-- V7 -->
    <rect x="94"  y="22" width="14" height="8" rx="1"/>  <!-- V8 -->
  </g>
  <!-- V2 highlighted (default selected) -->
  <rect x="4" y="22" width="14" height="8" rx="1" fill="#26a69a" fill-opacity="0.3" stroke="#26a69a" stroke-width="0.5"/>
  <g font-size="3.5" font-family="monospace" text-anchor="middle" fill="#aaa">
    <text x="11"  y="28">V2</text>
    <text x="26"  y="28">V3</text>
    <text x="41"  y="28">V4</text>
    <text x="56"  y="28">V5</text>
    <text x="71"  y="28">V6</text>
    <text x="86"  y="28">V7</text>
    <text x="101" y="28">V8</text>
  </g>

  <!-- VISUAL EDITOR ZONE (X=4mm Y=32mm W=114mm H=120mm) — 3 lanes -->
  <rect x="4" y="32" width="114" height="120" rx="2"
        fill="#111111" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,1"/>
  <!-- Lane labels inside zone -->
  <text x="8" y="52"  font-size="4.5" font-family="monospace" fill="#505050" font-weight="bold">REST</text>
  <text x="8" y="92"  font-size="4.5" font-family="monospace" fill="#b8860b" font-weight="bold">MELODY</text>
  <text x="8" y="132" font-size="4.5" font-family="monospace" fill="#b8860b" font-weight="bold">OCTAVE</text>
  <!-- Step tick marks -->
  <g stroke="#2a2a2a" stroke-width="0.3">
    <line x1="20"  y1="32" x2="20"  y2="35"/>
    <line x1="27"  y1="32" x2="27"  y2="35"/>
    <line x1="34"  y1="32" x2="34"  y2="35"/>
    <line x1="41"  y1="32" x2="41"  y2="35"/>
    <line x1="48"  y1="32" x2="48"  y2="35"/>
    <line x1="55"  y1="32" x2="55"  y2="35"/>
    <line x1="62"  y1="32" x2="62"  y2="35"/>
    <line x1="69"  y1="32" x2="69"  y2="35"/>
    <line x1="76"  y1="32" x2="76"  y2="35"/>
    <line x1="83"  y1="32" x2="83"  y2="35"/>
    <line x1="90"  y1="32" x2="90"  y2="35"/>
    <line x1="97"  y1="32" x2="97"  y2="35"/>
    <line x1="104" y1="32" x2="104" y2="35"/>
    <line x1="111" y1="32" x2="111" y2="35"/>
  </g>
  <!-- Lane divider lines (guide only) -->
  <line x1="4" y1="72"  x2="118" y2="72"  stroke="#222" stroke-width="0.3"/>
  <line x1="4" y1="112" x2="118" y2="112" stroke="#222" stroke-width="0.3"/>

  <!-- SPREAD SECTION (Y=158mm) -->
  <line x1="4" y1="156" x2="117.92" y2="156" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="4" y="163" font-size="4" font-family="monospace" fill="#555">SPREAD  (selected voice)</text>

  <!-- 3 spread sliders: REST | MELODY | OCTAVE (Y=168mm) -->
  <text x="20"  y="168" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#505050">RST</text>
  <rect x="15"  y="169" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="60"  y="168" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#b8860b">MEL</text>
  <rect x="55"  y="169" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="100" y="168" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#b8860b">OCT</text>
  <rect x="95"  y="169" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <!-- INTERP TARGET TOGGLE (Y=197mm) -->
  <line x1="4" y1="194" x2="117.92" y2="194" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="4" y="201" font-size="4" font-family="monospace" fill="#555">TARGET</text>
  <text x="42" y="201" font-size="4" font-family="monospace" fill="#555">AVG</text>
  <rect x="52" y="195" width="8" height="8" rx="1" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="63" y="201" font-size="4" font-family="monospace" fill="#555">MONO</text>

  <!-- FOOTER -->
  <text x="60.96" y="378" font-size="3" font-family="monospace" text-anchor="middle" fill="#444">east sands visual | 24 hp</text>
</svg>
