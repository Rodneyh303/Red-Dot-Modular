<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 203.2 380" width="203.2mm" height="380mm">
  <defs>
    <linearGradient id="brushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  
  <!-- PANEL BACKGROUND -->
  <rect width="203.2" height="380" fill="#e6e6e6"/>
  
  <!-- PANEL BORDER -->
  <rect x="0.5" y="0.5" width="202.2" height="379" fill="none" stroke="#ccc" stroke-width="0.8"/>
  
  <!-- HEADER AREA (dark) -->
  <rect x="0" y="0" width="203.2" height="16" fill="#d0d0d0"/>
  <line x1="2" y1="16" x2="201.2" y2="16" stroke="#999" stroke-width="0.5"/>
  
  <!-- RED DOT BRAND -->
  <circle cx="12" cy="8" r="3.5" fill="#dc2626"/>
  
  <!-- TITLE -->
  <text x="101.6" y="13" font-size="7" font-family="monospace" text-anchor="middle" fill="#333" font-weight="bold" letter-spacing="0.5">MONSOON</text>
  
  <!-- SECTION 1: STOCHASTIC PARAMETERS (Row 1) -->
  <text x="10" y="32" font-size="6" font-family="monospace" fill="#666" font-weight="bold">STOCHASTIC</text>
  
  <!-- 6 Large knobs: Note, Variation, Legato, Rest, Accent, Transpose -->
  <circle cx="20" cy="52" r="9.5" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="20" y="73" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">note</text>
  
  <circle cx="50" cy="52" r="9.5" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="50" y="73" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">variation</text>
  
  <circle cx="80" cy="52" r="9.5" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="80" y="73" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">legato</text>
  
  <circle cx="110" cy="52" r="9.5" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="110" y="73" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">rest</text>
  
  <circle cx="140" cy="52" r="9.5" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="140" y="73" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">accent</text>
  
  <circle cx="170" cy="52" r="9.5" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="170" y="73" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">transpose</text>
  
  <!-- SECTION 2: PATTERN ENGINE (Row 2) -->
  <text x="10" y="105" font-size="6" font-family="monospace" fill="#666" font-weight="bold">SEQUENCER</text>
  
  <!-- 3 knobs: BPM, Pattern Len, Pattern Off -->
  <circle cx="35" cy="125" r="8" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="35" y="142" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">bpm</text>
  
  <circle cx="75" cy="125" r="8" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="75" y="142" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">length</text>
  
  <circle cx="115" cy="125" r="8" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="115" y="142" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">offset</text>
  
  <!-- Mode selector -->
  <rect x="155" y="118" width="35" height="10" rx="1" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="172.5" y="135" font-size="5" font-family="monospace" text-anchor="middle" fill="#777">mode</text>
  
