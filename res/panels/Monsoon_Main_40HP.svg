  <text x="75" y="180" font-size="5" font-family="monospace" text-anchor="middle" fill="#777" font-weight="bold">MELODY</text>
  <text x="120" y="180" font-size="5" font-family="monospace" text-anchor="middle" fill="#777" font-weight="bold">OCTAVE</text>
  <text x="165" y="180" font-size="5" font-family="monospace" text-anchor="middle" fill="#777" font-weight="bold">INTERP</text>
  
  <!-- REST column (L/O/R knobs) -->
  <circle cx="20" cy="200" r="6.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="20" y="216" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">L</text>
  
  <circle cx="40" cy="200" r="5.5" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="40" y="214" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">O</text>
  
  <circle cx="50" cy="200" r="5.5" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="50" y="214" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">R</text>
  
  <!-- MELODY column (L/O/R knobs) -->
  <circle cx="65" cy="200" r="6.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="65" y="216" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">L</text>
  
  <circle cx="85" cy="200" r="5.5" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="85" y="214" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">O</text>
  
  <circle cx="95" cy="200" r="5.5" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="95" y="214" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">R</text>
  
  <!-- OCTAVE column (L/O/R knobs) -->
  <circle cx="110" cy="200" r="6.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="110" y="216" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">L</text>
  
  <circle cx="130" cy="200" r="5.5" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="130" y="214" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">O</text>
  
  <circle cx="140" cy="200" r="5.5" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="140" y="214" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">R</text>
  
  <!-- INTERPOLATION sliders (3 vertical, R/M/O) -->
  <rect x="157" y="190" width="5" height="35" rx="2" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="159.5" y="233" font-size="3" font-family="monospace" text-anchor="middle" fill="#888">R</text>
  
  <rect x="172" y="190" width="5" height="35" rx="2" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="174.5" y="233" font-size="3" font-family="monospace" text-anchor="middle" fill="#888">M</text>
  
  <rect x="187" y="190" width="5" height="35" rx="2" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="189.5" y="233" font-size="3" font-family="monospace" text-anchor="middle" fill="#888">O</text>
  
