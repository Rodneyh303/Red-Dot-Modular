  <text x="10" y="272" font-size="6" font-family="monospace" fill="#666" font-weight="bold">INPUTS</text>
  
  <circle cx="25" cy="290" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="25" y="308" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">clk</text>
  
  <circle cx="50" cy="290" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="50" y="308" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">rst</text>
  
  <circle cx="75" cy="290" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="75" y="308" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">gate1</text>
  
  <circle cx="100" cy="290" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="100" y="308" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">gate2</text>
  
  <circle cx="125" cy="290" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="125" y="308" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">cv2</text>
  
  <!-- SECTION 5: OUTPUTS -->
  <line x1="2" y1="330" x2="201.2" y2="330" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="10" y="342" font-size="6" font-family="monospace" fill="#666" font-weight="bold">OUTPUTS (11 JACKS)</text>
  
  <!-- Output row 1: 6 jacks -->
  <circle cx="20" cy="360" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="20" y="370" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">gate</text>
  
  <circle cx="42" cy="360" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="42" y="370" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">note</text>
  
  <circle cx="64" cy="360" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="64" y="370" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">cv</text>
  
  <circle cx="86" cy="360" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="86" y="370" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">accent</text>
  
  <circle cx="108" cy="360" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="108" y="370" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">legato</text>
  
  <circle cx="130" cy="360" r="4.5" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="130" y="370" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">tie</text>
  
  <!-- FOOTER: Expander hints + red line spacer -->
  <line x1="195" y1="270" x2="195" y2="360" stroke="#d0d0d0" stroke-width="1" stroke-dasharray="4,2" opacity="0.5"/>
  <text x="199" y="315" font-size="3" font-family="monospace" text-anchor="end" fill="#999">exp</text>
  
</svg>
