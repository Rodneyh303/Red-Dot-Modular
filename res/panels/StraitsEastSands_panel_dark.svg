<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  StraitsEastSands - Per-Voice DNA Control (East Expander)
  Dark Theme Panel (120mm width, ~24 HP)
  
  Identical layout to light theme with dark color scheme.
  Background: #232323 (deep charcoal)
  Text: #e4e4e7 (light slate)
  Accents: #dc2626 (cyberpunk crimson)
-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 380">
  <defs>
    <linearGradient id="panelEdgeDkEast" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  
  <!-- PANEL BACKGROUND (Dark Theme) -->
  <rect width="120" height="380" fill="#232323"/>
  
  <!-- Edge Highlight -->
  <rect width="120" height="380" fill="url(#panelEdgeDkEast)" opacity="0.8"/>
  
  <!-- ============================================================================
       HEADER
       ============================================================================ -->
  
  <text x="60" y="18" font-size="11" font-weight="bold" font-family="monospace" 
        text-anchor="middle" fill="#e4e4e7" letter-spacing="1">
    STRAITS SANDS
  </text>
  
  <text x="60" y="28" font-size="6" font-family="monospace" 
        text-anchor="middle" fill="#999" letter-spacing="0.5">
    east | voices 1-8
  </text>
  
  <!-- Brand Accent -->
  <circle cx="113" cy="10" r="2" fill="#dc2626"/>
  
  <!-- ============================================================================
       COLUMN HEADERS
       ============================================================================ -->
  
  <text x="7" y="42" font-size="5" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">V</text>
  
  <text x="20" y="42" font-size="5" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">R</text>
  
  <text x="40" y="42" font-size="5" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">M</text>
  
  <text x="60" y="42" font-size="5" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">O</text>
  
  <text x="80" y="42" font-size="5" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">I</text>
  
  <text x="105" y="42" font-size="5" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">Ctl</text>
  
  <!-- Sub-headers -->
  <text x="16" y="49" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">LOr</text>
  <text x="36" y="49" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">LOr</text>
  <text x="56" y="49" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">LOr</text>
  <text x="80" y="49" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">RMO</text>
  
  <!-- ============================================================================
       VOICE ROWS (1-8)
       ============================================================================ -->
  
  <g id="voiceRowDk">
    <line x1="2" y1="0" x2="118" y2="0" stroke="#444" stroke-width="0.25" opacity="0.5"/>
    
    <text x="7" y="8" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">1</text>
    
    <!-- Rest DNA -->
    <circle cx="13" cy="6" r="2.2" fill="none" stroke="#444" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
    <circle cx="19" cy="6" r="1.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
    <circle cx="25" cy="6" r="1.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
    
    <!-- Melody DNA -->
    <circle cx="33" cy="6" r="2.2" fill="none" stroke="#444" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
    <circle cx="39" cy="6" r="1.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
    <circle cx="45" cy="6" r="1.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
    
    <!-- Octave DNA -->
    <circle cx="53" cy="6" r="2.2" fill="none" stroke="#444" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
    <circle cx="59" cy="6" r="1.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
    <circle cx="65" cy="6" r="1.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
    
    <!-- Interpolation sliders -->
    <rect x="73" y="0" width="6" height="12" fill="none" stroke="#444" stroke-width="0.25" stroke-dasharray="1,0.8" opacity="0.5"/>
    <rect x="83" y="0" width="6" height="12" fill="none" stroke="#444" stroke-width="0.25" stroke-dasharray="1,0.8" opacity="0.5"/>
    <rect x="93" y="0" width="6" height="12" fill="none" stroke="#444" stroke-width="0.25" stroke-dasharray="1,0.8" opacity="0.5"/>
    
    <!-- Control buttons -->
    <rect x="102" y="1.5" width="4" height="4" rx="0.5" fill="none" stroke="#444" stroke-width="0.25" stroke-dasharray="1.5,1" opacity="0.5"/>
    <rect x="112" y="1.5" width="4" height="4" rx="0.5" fill="none" stroke="#444" stroke-width="0.25" stroke-dasharray="1.5,1" opacity="0.5"/>
  </g>
  
  <!-- Voice rows -->
  <g id="voice1_dk" transform="translate(0, 55)"><use xlink:href="#voiceRowDk"/></g>
  <g id="voice2_dk" transform="translate(0, 95)"><use xlink:href="#voiceRowDk"/></g>
  <g id="voice3_dk" transform="translate(0, 135)"><use xlink:href="#voiceRowDk"/></g>
  <g id="voice4_dk" transform="translate(0, 175)"><use xlink:href="#voiceRowDk"/></g>
  <g id="voice5_dk" transform="translate(0, 215)"><use xlink:href="#voiceRowDk"/></g>
  <g id="voice6_dk" transform="translate(0, 255)"><use xlink:href="#voiceRowDk"/></g>
  
  <!-- Voice labels -->
  <text x="7" y="103" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">2</text>
  <text x="7" y="143" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">3</text>
  <text x="7" y="183" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">4</text>
  <text x="7" y="223" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">5</text>
  <text x="7" y="263" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">6</text>
  <text x="7" y="303" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">7</text>
  <text x="7" y="343" font-size="5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">8</text>
  
  <!-- ============================================================================
       MASTER CONTROLS
       ============================================================================ -->
  
  <line x1="2" y1="365" x2="118" y2="365" stroke="#444" stroke-width="0.5"/>
  
  <rect x="20" y="370" width="6" height="6" rx="0.8" fill="none" stroke="#444" stroke-width="0.3" opacity="0.6"/>
  <text x="23" y="385" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">scr</text>
  
  <rect x="95" y="370" width="6" height="6" rx="0.8" fill="none" stroke="#444" stroke-width="0.3" opacity="0.6"/>
  <text x="98" y="385" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">rst</text>
  
  <!-- ============================================================================
       FOOTER
       ============================================================================ -->
  
  <text x="60" y="378" font-size="4" font-family="monospace" text-anchor="middle" fill="#555">red dot</text>
</svg>
