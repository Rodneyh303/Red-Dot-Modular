<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 121.92 380" width="121.92mm" height="380mm">
  <defs>
    <!-- ===== MATTE KNOB GRADIENTS ===== -->
    <!-- Attenuverter knob (small, matte) -->
    <radialGradient id="knobAttenuMatte" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#686868;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#484848;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#282828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </radialGradient>
    
    <!-- ===== INTEGRATED PERANAKAN PATTERN ===== -->
    <pattern id="peranakan_integrated" patternUnits="userSpaceOnUse" width="20" height="20">
      <polygon points="10,3 17,6 17,14 10,17 3,14 3,6" 
               fill="none" stroke="#333333" stroke-width="0.3" opacity="0.25"/>
      <line x1="10" y1="2" x2="10" y2="18" stroke="#333333" stroke-width="0.15" opacity="0.15"/>
      <line x1="2" y1="10" x2="18" y2="10" stroke="#333333" stroke-width="0.15" opacity="0.15"/>
    </pattern>
    
    <!-- ===== HORIZONTAL GRAIN (v6 style) ===== -->
    <pattern id="grain" x="0" y="0" width="121.92" height="0.2" patternUnits="userSpaceOnUse">
      <rect width="121.92" height="0.2" fill="#1a1a1a"/>
      <rect y="0.100" width="121.92" height="0.050" fill="#2a2a2a" opacity="0.4"/>
    </pattern>
    
    <!-- ===== JACK GRADIENT ===== -->
    <radialGradient id="jackMatte" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#606060;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#404040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </radialGradient>
  </defs>
  
  <!-- ===== BACKGROUND LAYERS ===== -->
  <rect width="121.92" height="380" fill="#1a1a1a"/>
  <rect width="121.92" height="380" fill="url(#peranakan_integrated)"/>
  <rect width="121.92" height="380" fill="url(#grain)"/>
  
  <!-- ===== PANEL BORDER ===== -->
  <rect x="0.5" y="0.5" width="120.92" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- ===== RED LINE ACCENT (LEFT) ===== -->
  <rect x="0" y="0" width="2.5" height="380" fill="#dc2626"/>
  <rect x="0" y="0" width="2.5" height="380" fill="#ff5555" opacity="0.2"/>
  
  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="121.92" height="16" fill="#0f0f0f"/>
  <line x1="2" y1="16" x2="119.92" y2="16" stroke="#2a2a2a" stroke-width="0.5"/>
  
  <!-- RED DOT -->
  <circle cx="10" cy="8" r="3" fill="#cc2222" stroke="#990000" stroke-width="0.2"/>
  <circle cx="8.5" cy="6.5" r="1" fill="#ff5555" opacity="0.4"/>
  
  <!-- TITLE -->
  <text x="60.96" y="13" font-size="7.5" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">INTERCHANGE</text>
  <text x="60.96" y="25" font-size="4.5" font-family="monospace" text-anchor="middle" fill="#888">CV modulation</text>
  
  <!-- ===== COLUMN HEADERS ===== -->
  <text x="32" y="40" font-size="5" font-family="monospace" text-anchor="middle" fill="#b8860b" font-weight="bold">left</text>
  <text x="90" y="40" font-size="5" font-family="monospace" text-anchor="middle" fill="#b8860b" font-weight="bold">right</text>
  
  <!-- Subheaders -->
  <text x="18" y="48" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">jack</text>
  <text x="32" y="48" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">atten</text>
  
  <text x="76" y="48" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">jack</text>
  <text x="90" y="48" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">atten</text>
  
  <!-- ===== MAIN GRID (7 rows × 2 columns) ===== -->
  <!-- Row spacing: 16mm (fits 7 rows in ~110mm height) -->
  <!-- Y offsets: 60, 76, 92, 108, 124, 140, 156 -->
  
  <!-- ===== ROW 1: C / F# ===== -->
  <!-- LEFT COLUMN: Semitone 1 (C) -->
  <text x="8" y="65" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">1</text>
  <text x="8" y="72" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">C</text>
  <g transform="translate(18, 60)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
    <circle cx="-1" cy="-1" r="0.6" fill="#555" opacity="0.3"/>
  </g>
  <g transform="translate(32, 60)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
    <rect x="-0.4" y="-3.2" width="0.8" height="1.2" rx="0.15" fill="#555" opacity="0.5"/>
  </g>
  
  <!-- RIGHT COLUMN: Semitone 7 (F#) -->
  <text x="66" y="65" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">7</text>
  <text x="66" y="72" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">F#</text>
  <g transform="translate(76, 60)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
    <circle cx="-1" cy="-1" r="0.6" fill="#555" opacity="0.3"/>
  </g>
  <g transform="translate(90, 60)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
    <rect x="-0.4" y="-3.2" width="0.8" height="1.2" rx="0.15" fill="#555" opacity="0.5"/>
  </g>
  
  <!-- ===== ROW 2: C# / G ===== -->
  <text x="8" y="81" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">2</text>
  <text x="8" y="88" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">C#</text>
  <g transform="translate(18, 76)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(32, 76)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <text x="66" y="81" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">8</text>
  <text x="66" y="88" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">G</text>
  <g transform="translate(76, 76)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(90, 76)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <!-- ===== ROW 3: D / G# ===== -->
  <text x="8" y="97" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">3</text>
  <text x="8" y="104" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">D</text>
  <g transform="translate(18, 92)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(32, 92)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <text x="66" y="97" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">9</text>
  <text x="66" y="104" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">G#</text>
  <g transform="translate(76, 92)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(90, 92)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <!-- ===== ROW 4: D# / A ===== -->
  <text x="8" y="113" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">4</text>
  <text x="8" y="120" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">D#</text>
  <g transform="translate(18, 108)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(32, 108)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <text x="66" y="113" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">10</text>
  <text x="66" y="120" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">A</text>
  <g transform="translate(76, 108)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(90, 108)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <!-- ===== ROW 5: E / A# ===== -->
  <text x="8" y="129" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">5</text>
  <text x="8" y="136" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">E</text>
  <g transform="translate(18, 124)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(32, 124)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <text x="66" y="129" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">11</text>
  <text x="66" y="136" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">A#</text>
  <g transform="translate(76, 124)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(90, 124)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <!-- ===== ROW 6: F / B ===== -->
  <text x="8" y="145" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">6</text>
  <text x="8" y="152" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">F</text>
  <g transform="translate(18, 140)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(32, 140)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <text x="66" y="145" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">12</text>
  <text x="66" y="152" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999">B</text>
  <g transform="translate(76, 140)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
  </g>
  <g transform="translate(90, 140)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
  </g>
  
  <!-- ===== ROW 7: OCTAVE LO / OCTAVE HI ===== -->
  <!-- Separator line -->
  <line x1="2" y1="165" x2="119.92" y2="165" stroke="#2a2a2a" stroke-width="0.5"/>
  
  <text x="8" y="185" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">OCT</text>
  <text x="8" y="195" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">LO</text>
  <g transform="translate(18, 180)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
    <circle cx="-1" cy="-1" r="0.6" fill="#555" opacity="0.3"/>
  </g>
  <g transform="translate(32, 180)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
    <rect x="-0.4" y="-3.2" width="0.8" height="1.2" rx="0.15" fill="#555" opacity="0.5"/>
  </g>
  
  <text x="66" y="185" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">OCT</text>
  <text x="66" y="195" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">HI</text>
  <g transform="translate(76, 180)">
    <circle cx="0" cy="0" r="3.5" fill="url(#jackMatte)" stroke="#0a0a0a" stroke-width="0.3"/>
    <circle cx="0" cy="0" r="2.2" fill="#0a0a0a"/>
    <circle cx="-1" cy="-1" r="0.6" fill="#555" opacity="0.3"/>
  </g>
  <g transform="translate(90, 180)">
    <circle cx="0" cy="0" r="2.5" fill="url(#knobAttenuMatte)" stroke="#0a0a0a" stroke-width="0.2"/>
    <rect x="-0.4" y="-3.2" width="0.8" height="1.2" rx="0.15" fill="#555" opacity="0.5"/>
  </g>
  
  <!-- ===== LEGEND ===== -->
  <line x1="2" y1="220" x2="119.92" y2="220" stroke="#2a2a2a" stroke-width="0.5"/>
  
  <text x="60.96" y="245" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">14 CV Modulation Inputs</text>
  <text x="60.96" y="255" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#666">Semitones 1-12 + Octave</text>
  
  <text x="60.96" y="275" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999" font-style="italic">Left column: Sem 1-6 + Oct Lo</text>
  <text x="60.96" y="285" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#999" font-style="italic">Right column: Sem 7-12 + Oct Hi</text>
  
  <!-- ===== FOOTER ===== -->
  <text x="60.96" y="378" font-size="3" font-family="monospace" text-anchor="middle" fill="#555">interchange | 24 hp | cv modulation expander</text>
  
</svg>
