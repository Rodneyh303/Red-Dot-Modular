<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 121.92 380" width="121.92mm" height="380mm">
  <defs>
    <linearGradient id="brushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="50%"  style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="121.92" height="380" fill="#1a1a1a"/>
  <rect x="0.5" y="0.5" width="120.92" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  <!-- Purple left accent (macro/global) -->
  <rect x="0" y="0" width="2" height="380" fill="#9c27b0"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="121.92" height="16" fill="#141414"/>
  <line x1="2" y1="16" x2="119.92" y2="16" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="12" cy="8" r="3.5" fill="#dc2626"/>
  <text x="60.96" y="13" font-size="7" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">SANDS MACRO</text>

  <!-- ALL-VOICES BADGE -->
  <rect x="76" y="17" width="42" height="7" rx="1" fill="#1e1e3a"/>
  <text x="97" y="22" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#9c27b0">ALL VOICES 2–16</text>

  <!-- VISUAL EDITOR ZONE (X=4mm Y=26mm W=114mm H=130mm) — 3 lanes, representative -->
  <rect x="4" y="26" width="114" height="130" rx="2"
        fill="#111111" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,1"/>
  <!-- Representative label -->
  <text x="60.96" y="32" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#555">representative · voice 2</text>
  <!-- Lane labels -->
  <text x="8" y="52"  font-size="4.5" font-family="monospace" fill="#505050" font-weight="bold">REST</text>
  <text x="8" y="95"  font-size="4.5" font-family="monospace" fill="#b8860b" font-weight="bold">MELODY</text>
  <text x="8" y="138" font-size="4.5" font-family="monospace" fill="#b8860b" font-weight="bold">OCTAVE</text>
  <!-- Lane dividers -->
  <line x1="4" y1="76"  x2="118" y2="76"  stroke="#222" stroke-width="0.3"/>
  <line x1="4" y1="119" x2="118" y2="119" stroke="#222" stroke-width="0.3"/>
  <!-- Step ticks -->
  <g stroke="#2a2a2a" stroke-width="0.3">
    <line x1="20" y1="26" x2="20" y2="29"/>  <line x1="27" y1="26" x2="27" y2="29"/>
    <line x1="34" y1="26" x2="34" y2="29"/>  <line x1="41" y1="26" x2="41" y2="29"/>
    <line x1="48" y1="26" x2="48" y2="29"/>  <line x1="55" y1="26" x2="55" y2="29"/>
    <line x1="62" y1="26" x2="62" y2="29"/>  <line x1="69" y1="26" x2="69" y2="29"/>
    <line x1="76" y1="26" x2="76" y2="29"/>  <line x1="83" y1="26" x2="83" y2="29"/>
    <line x1="90" y1="26" x2="90" y2="29"/>  <line x1="97" y1="26" x2="97" y2="29"/>
    <line x1="104" y1="26" x2="104" y2="29"/> <line x1="111" y1="26" x2="111" y2="29"/>
  </g>

  <!-- GLOBAL SPREAD SECTION -->
  <line x1="4" y1="160" x2="117.92" y2="160" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="4" y="167" font-size="4" font-family="monospace" fill="#555">GLOBAL SPREAD  (all voices)</text>

  <!-- 3 global spread sliders: REST | MELODY | OCTAVE -->
  <text x="20"  y="172" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#505050">RST</text>
  <rect x="15"  y="173" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="60"  y="172" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#b8860b">MEL</text>
  <rect x="55"  y="173" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="100" y="172" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#b8860b">OCT</text>
  <rect x="95"  y="173" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <!-- INTERP TARGET TOGGLE -->
  <line x1="4" y1="198" x2="117.92" y2="198" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="4" y="205" font-size="4" font-family="monospace" fill="#555">TARGET</text>
  <text x="42" y="205" font-size="4" font-family="monospace" fill="#555">AVG</text>
  <rect x="52" y="199" width="8" height="8" rx="1" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="63" y="205" font-size="4" font-family="monospace" fill="#555">MONO</text>

  <!-- Note about macro behaviour -->
  <rect x="4" y="215" width="114" height="14" rx="2" fill="#1a1a2e"/>
  <text x="60.96" y="221" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#555">spread applied equally to all 15 voices</text>
  <text x="60.96" y="227" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#444">average recalculates from active voices</text>

  <!-- FOOTER -->
  <text x="60.96" y="378" font-size="3" font-family="monospace" text-anchor="middle" fill="#444">sands macro visual | 24 hp</text>
</svg>
