<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  DeepStraitsSands - Per-Voice DNA Control (Detailed)
  Dark Theme Panel (280mm width, ~55 HP)
  
  Identical layout to light theme with dark color scheme.
  Background: #232323 (deep charcoal)
  Text: #e4e4e7 (light slate)
  Accents: #dc2626 (cyberpunk crimson)
-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380">
  <defs>
    <linearGradient id="panelEdgeDkGradient280" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  
  <!-- PANEL BACKGROUND (Dark Theme) -->
  <rect width="280" height="380" fill="#232323"/>
  
  <!-- Edge Highlight -->
  <rect width="280" height="380" fill="url(#panelEdgeDkGradient280)" opacity="0.8"/>
  
  <!-- ============================================================================
       HEADER / BRANDING
       ============================================================================ -->
  
  <text x="140" y="18" font-size="12" font-weight="bold" font-family="monospace" 
        text-anchor="middle" fill="#e4e4e7" letter-spacing="1">
    DEEP STRAITS SANDS
  </text>
  
  <text x="140" y="30" font-size="8" font-family="monospace" 
        text-anchor="middle" fill="#999" letter-spacing="0.5">
    per-voice dna control
  </text>
  
  <!-- Brand Accent (Red Dot) -->
  <circle cx="270" cy="10" r="2.5" fill="#dc2626"/>
  
  <!-- ============================================================================
       COLUMN HEADERS
       ============================================================================ -->
  
  <text x="8" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">V</text>
  
  <text x="30" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">REST</text>
  
  <text x="95" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">MELODY</text>
  
  <text x="160" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">OCTAVE</text>
  
  <text x="215" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">INTERP</text>
  
  <text x="260" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#e4e4e7" font-weight="bold">CTL</text>
  
  <!-- Sub-headers -->
  <text x="20" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">L</text>
  <text x="30" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">O</text>
  <text x="40" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">R</text>
  
  <text x="85" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">L</text>
  <text x="95" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">O</text>
  <text x="105" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">R</text>
  
  <text x="150" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">L</text>
  <text x="160" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">O</text>
  <text x="170" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">R</text>
  
  <text x="205" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">R</text>
  <text x="215" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">M</text>
  <text x="225" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">O</text>
  
  <!-- ============================================================================
       VOICE ROWS (1-15)
       ============================================================================ -->
  
  <g id="voice1_row_dk">
    <line x1="2" y1="60" x2="278" y2="60" stroke="#444" stroke-width="0.3"/>
    <text x="8" y="65" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">1</text>
    
    <!-- Rest DNA knobs -->
    <circle cx="20" cy="63" r="3.5" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="30" cy="63" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="40" cy="63" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Melody DNA knobs -->
    <circle cx="85" cy="63" r="3.5" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="95" cy="63" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="105" cy="63" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Octave DNA knobs -->
    <circle cx="150" cy="63" r="3.5" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="160" cy="63" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="170" cy="63" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Interpolation sliders -->
    <rect x="202" y="56" width="6" height="14" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1,1" opacity="0.6"/>
    <rect x="212" y="56" width="6" height="14" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1,1" opacity="0.6"/>
    <rect x="222" y="56" width="6" height="14" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="1,1" opacity="0.6"/>
    
    <!-- Buttons -->
    <rect x="245" y="59" width="5" height="5" rx="0.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <rect x="260" y="59" width="5" height="5" rx="0.8" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Gate inputs -->
    <circle cx="245" cy="68" r="2" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="260" cy="68" r="2" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
  </g>
  
  <!-- Voice rows 2-15 -->
  <g id="voice2_row_dk" transform="translate(0, 11)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice3_row_dk" transform="translate(0, 22)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice4_row_dk" transform="translate(0, 33)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice5_row_dk" transform="translate(0, 44)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice6_row_dk" transform="translate(0, 55)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice7_row_dk" transform="translate(0, 66)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice8_row_dk" transform="translate(0, 77)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice9_row_dk" transform="translate(0, 88)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice10_row_dk" transform="translate(0, 99)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice11_row_dk" transform="translate(0, 110)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice12_row_dk" transform="translate(0, 121)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice13_row_dk" transform="translate(0, 132)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice14_row_dk" transform="translate(0, 143)"><use xlink:href="#voice1_row_dk"/></g>
  <g id="voice15_row_dk" transform="translate(0, 154)"><use xlink:href="#voice1_row_dk"/></g>
  
  <!-- Voice number labels -->
  <text x="8" y="185" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">2</text>
  <text x="8" y="196" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">3</text>
  <text x="8" y="207" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">4</text>
  <text x="8" y="218" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">5</text>
  <text x="8" y="229" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">6</text>
  <text x="8" y="240" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">7</text>
  <text x="8" y="251" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">8</text>
  <text x="8" y="262" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">9</text>
  <text x="8" y="273" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">10</text>
  <text x="8" y="284" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">11</text>
  <text x="8" y="295" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">12</text>
  <text x="8" y="306" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">13</text>
  <text x="8" y="317" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">14</text>
  <text x="8" y="328" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">15</text>
  
  <!-- ============================================================================
       MASTER CONTROLS (Bottom)
       ============================================================================ -->
  
  <!-- Separator line -->
  <line x1="2" y1="335" x2="278" y2="335" stroke="#444" stroke-width="0.8"/>
  
  <!-- Master label -->
  <text x="8" y="350" font-size="6" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">
    MASTER
  </text>
  
  <!-- Master buttons -->
  <rect x="30" y="345" width="8" height="8" rx="1" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="34" y="362" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scramble-all</text>
  
  <rect x="95" y="345" width="8" height="8" rx="1" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="99" y="362" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">reset-all</text>
  
  <!-- Master gate inputs -->
  <circle cx="160" cy="349" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="160" y="366" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scr-gate</text>
  
  <circle cx="225" cy="349" r="3" fill="none" stroke="#444" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="225" y="366" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">rst-gate</text>
  
  <!-- ============================================================================
       FOOTER
       ============================================================================ -->
  
  <text x="140" y="378" font-size="5" font-family="monospace" text-anchor="middle" fill="#555" letter-spacing="1">
    red dot | deep straits sands
  </text>
</svg>
