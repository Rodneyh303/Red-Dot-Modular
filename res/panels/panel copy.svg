<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="168.5mm" height="128.5mm" viewBox="0 0 168.5 128.5" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect x="0" y="0" width="188.5" height="128.5" fill="#f5f5f5"/>
  <!-- Brushed metal effect -->
  <defs>
    <linearGradient id="metalGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0e0e0"/>
      <stop offset="1" stop-color="#d0d0d0"/>
    </linearGradient>
    <radialGradient id="etchedRing" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#cccccc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="188.5" height="128.5" fill="url(#metalGrad)"/>

  <!-- Top branding strip -->
  <rect x="0" y="0" width="188.5" height="8" fill="#d33"/>
  <text x="60" y="6.5" font-family="Inter, Arial, sans-serif" font-size="4.2" fill="#ffffff">Red Dot Modular - MeloDicer</text>

  <!-- Top knobs -->
  <text x="14" y="40" text-anchor="middle" font-size="3.6" fill="#000000">NOTE</text>
  <text x="42" y="40" text-anchor="middle" font-size="3.6" fill="#000000">VAR</text>
  <text x="70" y="40" text-anchor="middle" font-size="3.6" fill="#000000">LEG</text>
  <text x="98" y="40" text-anchor="middle" font-size="3.6" fill="#000000">REST</text>

  <!-- Semitone sliders -->
  <text x="10" y="46" font-size="3.2" fill="#000000">C</text>
  <text x="18" y="46" font-size="3.2" fill="#000000">C#</text>
  <text x="26" y="46" font-size="3.2" fill="#000000">D</text>
  <text x="34" y="46" font-size="3.2" fill="#000000">D#</text>
  <text x="42" y="46" font-size="3.2" fill="#000000">E</text>
  <text x="50" y="46" font-size="3.2" fill="#000000">F</text>
  <text x="58" y="46" font-size="3.2" fill="#000000">F#</text>
  <text x="66" y="46" font-size="3.2" fill="#000000">G</text>
  <text x="74" y="46" font-size="3.2" fill="#000000">G#</text>
  <text x="82" y="46" font-size="3.2" fill="#000000">A</text>
  <text x="90" y="46" font-size="3.2" fill="#000000">A#</text>
  <text x="98" y="46" font-size="3.2" fill="#000000">B</text>
    <!-- Semitone sliders bottom -->
  <text x="10" y="86" font-size="3.2" fill="#000000">1</text>
  <text x="18" y="86" font-size="3.2" fill="#000000">2</text>
  <text x="26" y="86" font-size="3.2" fill="#000000">3</text>
  <text x="34" y="86" font-size="3.2" fill="#000000">4</text>
  <text x="42" y="86" font-size="3.2" fill="#000000">5</text>
  <text x="50" y="86" font-size="3.2" fill="#000000">6</text>
  <text x="58" y="86" font-size="3.2" fill="#000000">7</text>
  <text x="66" y="86" font-size="3.2" fill="#000000">8</text>
  <text x="74" y="86" font-size="3.2" fill="#000000">9</text>
  <text x="82" y="86" font-size="3.2" fill="#000000">10</text>
  <text x="90" y="86" font-size="3.2" fill="#000000">11</text>
  <text x="98" y="86" font-size="3.2" fill="#000000">12</text>

  <!-- Octave sliders -->
  <text x="114" y="86" font-size="3.2" fill="#000000">OCT LO</text>
  <text x="126" y="86" font-size="3.2" fill="#000000">OCT HI</text>

  <!-- Pattern ring etched circle -->
  <circle cx="130" cy="28" r="12" stroke="#aaa" stroke-width="0.5" fill="url(#etchedRing)"/>

  <!-- Pattern knobs -->
  <text x="12" y="110" font-size="3.2" fill="#000000" text-anchor="middle">LEN</text>
  <text x="28" y="110" font-size="3.2" fill="#000000" text-anchor="middle">OFF</text>

  <!-- Dice / Lock / Mute -->
  <text x="128" y="120" font-size="3.0" fill="#000000" text-anchor="middle">DICE R</text>
  <text x="140" y="120" font-size="3.0" fill="#000000" text-anchor="middle">DICE M</text>
  <text x="128" y="110" font-size="3.0" fill="#000000" text-anchor="middle">LOCK</text>
  <text x="140" y="110" font-size="3.0" fill="#000000" text-anchor="middle">MUTE</text>

  <!-- Mode buttons -->
  <text x="150" y="68" font-size="3.0" fill="#000000" text-anchor="middle">A</text>
  <text x="150" y="78" font-size="3.0" fill="#000000" text-anchor="middle">B</text>
  <text x="150" y="88" font-size="3.0" fill="#000000" text-anchor="middle">C</text>
  <text x="150" y="98" font-size="3.0" fill="#000000" text-anchor="middle">D</text>

  <!-- I/O labels -->
  <text x="12" y="120" font-size="3.0" text-anchor="middle" fill="#000000">CLK</text>
  <text x="28" y="120" font-size="3.0" text-anchor="middle" fill="#000000">G1</text>
  <text x="44" y="120" font-size="3.0" text-anchor="middle" fill="#000000">G2</text>
  <text x="60" y="120" font-size="3.0" text-anchor="middle" fill="#000000">CV1</text>
  <text x="76" y="120" font-size="3.0" text-anchor="middle" fill="#000000">CV2</text>
  <text x="44" y="110" font-size="3.0" text-anchor="middle" fill="#000000">RST</text>
  <text x="60" y="110" font-size="3.0" text-anchor="middle" fill="#000000">SEED</text>
  <text x="72" y="110" font-size="3.0" text-anchor="middle" fill="#000000">GATE</text>
  <text x="84" y="110" font-size="3.0" text-anchor="middle" fill="#000000">CV</text>
  <text x="96" y="110" font-size="3.0" text-anchor="middle" fill="#000000">SEED OUT</text>


</svg>
