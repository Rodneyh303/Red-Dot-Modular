<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  StraitsSands - Macro Global DNA Control
  Light Theme Panel (60-80mm width, ~12-16 HP)
  
  Three-column layout: Rest | Melody | Octave
  Each column: Length knob, Offset knob, Rotation knob, Interpolation slider
  Master controls: Scramble + Reset buttons + gates
  
  The peranakan lattice pattern is generated by C++ in MonsoonStraitsSandsWidget::draw()
  This SVG provides: Background, labels, component guide marks, highlights
-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 380">
  <defs>
    <!-- Smooth gradient for panel edges (subtle depth) -->
    <linearGradient id="panelEdgeLtGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- PANEL BACKGROUND (Light Theme) -->
  <rect width="80" height="380" fill="#e6e6e6"/>
  
  <!-- Edge Highlight (subtle depth perception) -->
  <rect width="80" height="380" fill="url(#panelEdgeLtGradient)" opacity="0.8"/>
  
  <!-- ============================================================================
       HEADER / BRANDING
       ============================================================================ -->
  
  <!-- Module Name -->
  <text x="40" y="18" font-size="11" font-weight="bold" font-family="monospace" 
        text-anchor="middle" fill="#232323" letter-spacing="1">
    STRAITS SANDS
  </text>
  
  <!-- Subtitle -->
  <text x="40" y="28" font-size="7" font-family="monospace" 
        text-anchor="middle" fill="#666" letter-spacing="0.5">
    macro dna
  </text>
  
  <!-- Brand Accent (Red Dot) -->
  <circle cx="75" cy="8" r="2" fill="#dc2626"/>
  
  <!-- ============================================================================
       COLUMN HEADERS
       ============================================================================ -->
  
  <text x="13" y="45" font-size="7" font-family="monospace" text-anchor="middle" fill="#232323" font-weight="bold">
    REST
  </text>
  
  <text x="40" y="45" font-size="7" font-family="monospace" text-anchor="middle" fill="#232323" font-weight="bold">
    MELODY
  </text>
  
  <text x="67" y="45" font-size="7" font-family="monospace" text-anchor="middle" fill="#232323" font-weight="bold">
    OCTAVE
  </text>
  
  <!-- ============================================================================
       CONTROL GROUP 1: DNA WINDOW CONTROLS (Len, Off, Rot)
       ============================================================================ -->
  
  <!-- REST Column -->
  <!-- DNA Length Knob guide circle -->
  <circle cx="13" cy="65" r="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="13" y="88" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">len</text>
  
  <!-- DNA Offset Knob guide -->
  <circle cx="13" cy="108" r="6" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="13" y="127" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">off</text>
  
  <!-- DNA Rotation Knob guide -->
  <circle cx="13" cy="151" r="6" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="13" y="170" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">rot</text>
  
  <!-- Interpolation Slider guide (vertical) -->
  <rect x="9" y="190" width="8" height="60" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.6"/>
  <text x="13" y="260" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">interp</text>
  
  <!-- MELODY Column (identical layout) -->
  <circle cx="40" cy="65" r="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="40" y="88" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">len</text>
  
  <circle cx="40" cy="108" r="6" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="40" y="127" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">off</text>
  
  <circle cx="40" cy="151" r="6" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="40" y="170" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">rot</text>
  
  <rect x="36" y="190" width="8" height="60" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.6"/>
  <text x="40" y="260" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">interp</text>
  
  <!-- OCTAVE Column (identical layout) -->
  <circle cx="67" cy="65" r="8" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="67" y="88" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">len</text>
  
  <circle cx="67" cy="108" r="6" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="67" y="127" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">off</text>
  
  <circle cx="67" cy="151" r="6" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="67" y="170" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">rot</text>
  
  <rect x="63" y="190" width="8" height="60" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.6"/>
  <text x="67" y="260" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">interp</text>
  
  <!-- ============================================================================
       CONTROL GROUP 2: MASTER CONTROLS (bottom)
       ============================================================================ -->
  
  <!-- Separator line -->
  <line x1="5" y1="280" x2="75" y2="280" stroke="#ddd" stroke-width="0.5"/>
  
  <!-- SCRAMBLE Button guide -->
  <rect x="8" y="295" width="12" height="12" rx="2" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="14" y="320" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scramble</text>
  
  <!-- RESET Button guide -->
  <rect x="60" y="295" width="12" height="12" rx="2" fill="none" stroke="#ccc" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="66" y="320" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">reset</text>
  
  <!-- Gate Input guide circles (bottom row) -->
  <circle cx="14" cy="345" r="4.5" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="14" y="360" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scr-gate</text>
  
  <circle cx="66" cy="345" r="4.5" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="66" y="360" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">rst-gate</text>
  
  <!-- ============================================================================
       BRANDING & FOOTER
       ============================================================================ -->
  
  <text x="40" y="378" font-size="5" font-family="monospace" text-anchor="middle" fill="#aaa" letter-spacing="1">
    red dot
  </text>
</svg>
