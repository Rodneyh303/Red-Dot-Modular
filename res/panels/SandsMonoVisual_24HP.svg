<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 121.92 380" width="121.92mm" height="380mm">
  <defs>
    <linearGradient id="brushed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   style="stop-color:#ffffff;stop-opacity:0.08"/>
      <stop offset="50%"  style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- BACKGROUND -->
  <rect width="121.92" height="380" fill="#1a1a1a"/>
  <rect x="0.5" y="0.5" width="120.92" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  <!-- Gold left accent (mono = voice 1) -->
  <rect x="0" y="0" width="2" height="380" fill="#d4af37"/>

  <!-- HEADER -->
  <rect x="0" y="0" width="121.92" height="16" fill="#141414"/>
  <line x1="2" y1="16" x2="119.92" y2="16" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="12" cy="8" r="3.5" fill="#dc2626"/>
  <text x="60.96" y="13" font-size="8" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">SANDS VISUAL</text>

  <!-- VISUAL EDITOR ZONE (X=4mm Y=20mm W=114mm H=135mm) -->
  <rect x="4" y="20" width="114" height="135" rx="2"
        fill="#111111" stroke="#333333" stroke-width="0.5" stroke-dasharray="2,1"/>
  <text x="8" y="28" font-size="4.5" font-family="monospace" fill="#d4af37" font-weight="bold">REST</text>
  <text x="8" y="42" font-size="4.5" font-family="monospace" fill="#b8860b" font-weight="bold">MELODY</text>
  <text x="8" y="56" font-size="4.5" font-family="monospace" fill="#b8860b" font-weight="bold">OCTAVE</text>
  <text x="8" y="70" font-size="4.5" font-family="monospace" fill="#26a69a" font-weight="bold">LEGATO</text>
  <text x="8" y="84" font-size="4.5" font-family="monospace" fill="#ff9500" font-weight="bold">ACCENT</text>
  <text x="8" y="98" font-size="4.5" font-family="monospace" fill="#ff6b6b" font-weight="bold">VARIATION</text>
  <!-- 16-step tick marks along top of editor zone -->
  <g stroke="#2a2a2a" stroke-width="0.3">
    <line x1="20"  y1="20" x2="20"  y2="23"/>
    <line x1="27"  y1="20" x2="27"  y2="23"/>
    <line x1="34"  y1="20" x2="34"  y2="23"/>
    <line x1="41"  y1="20" x2="41"  y2="23"/>
    <line x1="48"  y1="20" x2="48"  y2="23"/>
    <line x1="55"  y1="20" x2="55"  y2="23"/>
    <line x1="62"  y1="20" x2="62"  y2="23"/>
    <line x1="69"  y1="20" x2="69"  y2="23"/>
    <line x1="76"  y1="20" x2="76"  y2="23"/>
    <line x1="83"  y1="20" x2="83"  y2="23"/>
    <line x1="90"  y1="20" x2="90"  y2="23"/>
    <line x1="97"  y1="20" x2="97"  y2="23"/>
    <line x1="104" y1="20" x2="104" y2="23"/>
    <line x1="111" y1="20" x2="111" y2="23"/>
  </g>

  <!-- SPREAD SECTION DIVIDER -->
  <line x1="4" y1="158" x2="117.92" y2="158" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="4" y="165" font-size="4" font-family="monospace" fill="#666">SPREAD  →  0.5</text>

  <!-- SPREAD SLIDERS ROW 1: REST | MELODY | OCTAVE  (Y=167mm) -->
  <text x="20" y="172" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#d4af37">RST</text>
  <rect x="15" y="173" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="60" y="172" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#b8860b">MEL</text>
  <rect x="55" y="173" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="100" y="172" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#b8860b">OCT</text>
  <rect x="95" y="173" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <!-- SPREAD SLIDERS ROW 2: LEGATO | ACCENT | VARIATION  (Y=187mm) -->
  <text x="20" y="192" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#26a69a">LEG</text>
  <rect x="15" y="193" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="60" y="192" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#ff9500">ACC</text>
  <rect x="55" y="193" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <text x="100" y="192" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#ff6b6b">VAR</text>
  <rect x="95" y="193" width="10" height="18" rx="1" fill="none" stroke="#333" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>

  <!-- INTERP TARGET TOGGLE (Y=207mm) -->
  <line x1="4" y1="214" x2="117.92" y2="214" stroke="#2a2a2a" stroke-width="0.5"/>
  <text x="4" y="221" font-size="4" font-family="monospace" fill="#666">TARGET</text>
  <text x="42" y="221" font-size="4" font-family="monospace" fill="#555">FLAT</text>
  <rect x="55" y="215" width="8" height="8" rx="1" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="66" y="221" font-size="4" font-family="monospace" fill="#555">POLY</text>

  <!-- FOOTER -->
  <text x="60.96" y="378" font-size="3" font-family="monospace" text-anchor="middle" fill="#444">sands visual | mono | 24 hp</text>
</svg>
