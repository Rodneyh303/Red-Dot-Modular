<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  StraitsSands - Macro Global DNA Control
  Dark Theme Panel (60-80mm width, ~12-16 HP)
  
  Identical layout to light theme with dark color scheme.
  Background: #232323 (deep charcoal)
  Text: #e4e4e7 (light slate)
  Accents: #dc2626 (cyberpunk crimson)
-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 380">
  <defs>
    <linearGradient id="panelEdgeDkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.03" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.03" />
    </linearGradient>
  </defs>
  
  <!-- PANEL BACKGROUND (Dark Theme) -->
  <rect width="80" height="380" fill="#232323"/>
  
  <!-- Edge Highlight (subtle depth) -->
  <rect width="80" height="380" fill="url(#panelEdgeDkGradient)" opacity="0.8"/>
  
  <!-- ============================================================================
       HEADER / BRANDING
       ============================================================================ -->
  
  <text x="40" y="18" font-size="11" font-weight="bold" font-family="monospace" 
        text-anchor="middle" fill="#e4e4e7" letter-spacing="1">
    STRAITS SANDS
  </text>
  
  <text x="40" y="28" font-size="7" font-family="monospace" 
        text-anchor="middle" fill="#999" letter-spacing="0.5">
    macro dna
  </text>
  
  <!-- Brand Accent (Red Dot) -->
  <circle cx="75" cy="8" r="2" fill="#dc2626"/>
  
  <!-- ============================================================================
       COLUMN HEADERS
       ============================================================================ -->
  
  <text x="13" y="45" font-size="7" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">
    REST
  </text>
  
  <text x="40" y="45" font-size="7" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">
    MELODY
  </text>
  
  <text x="67" y="45" font-size="7" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">
    OCTAVE
  </text>
  
  <!-- ============================================================================
       CONTROL GROUP 1: DNA WINDOW CONTROLS
       ============================================================================ -->
  
  <!-- REST Column -->
  <circle cx="13" cy="65" r="8" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="13" y="88" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">len</text>
  
  <circle cx="13" cy="108" r="6" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="13" y="127" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">off</text>
  
  <circle cx="13" cy="151" r="6" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="13" y="170" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">rot</text>
  
  <rect x="9" y="190" width="8" height="60" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.6"/>
  <text x="13" y="260" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">interp</text>
  
  <!-- MELODY Column -->
  <circle cx="40" cy="65" r="8" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="40" y="88" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">len</text>
  
  <circle cx="40" cy="108" r="6" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="40" y="127" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">off</text>
  
  <circle cx="40" cy="151" r="6" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="40" y="170" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">rot</text>
  
  <rect x="36" y="190" width="8" height="60" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.6"/>
  <text x="40" y="260" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">interp</text>
  
  <!-- OCTAVE Column -->
  <circle cx="67" cy="65" r="8" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="67" y="88" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">len</text>
  
  <circle cx="67" cy="108" r="6" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="67" y="127" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">off</text>
  
  <circle cx="67" cy="151" r="6" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="67" y="170" font-size="6" font-family="monospace" text-anchor="middle" fill="#888">rot</text>
  
  <rect x="63" y="190" width="8" height="60" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="1,1" opacity="0.6"/>
  <text x="67" y="260" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">interp</text>
  
  <!-- ============================================================================
       CONTROL GROUP 2: MASTER CONTROLS
       ============================================================================ -->
  
  <!-- Separator line -->
  <line x1="5" y1="280" x2="75" y2="280" stroke="#444" stroke-width="0.5"/>
  
  <!-- SCRAMBLE Button guide -->
  <rect x="8" y="295" width="12" height="12" rx="2" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="14" y="320" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scramble</text>
  
  <!-- RESET Button guide -->
  <rect x="60" y="295" width="12" height="12" rx="2" fill="none" stroke="#444" stroke-width="0.5" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="66" y="320" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">reset</text>
  
  <!-- Gate Inputs (bottom) -->
  <circle cx="14" cy="345" r="4.5" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="14" y="360" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scr-gate</text>
  
  <circle cx="66" cy="345" r="4.5" fill="none" stroke="#444" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="66" y="360" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">rst-gate</text>
  
  <!-- ============================================================================
       FOOTER
       ============================================================================ -->
  
  <text x="40" y="378" font-size="5" font-family="monospace" text-anchor="middle" fill="#555" letter-spacing="1">
    red dot
  </text>
</svg>
