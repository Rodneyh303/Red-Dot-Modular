<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 142.24 380" width="142.24mm" height="380mm">
  <defs>
    <!-- ===== MATTE KNOB GRADIENTS ===== -->
    <radialGradient id="knobAttenuMatte" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#686868;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#484848;stop-opacity:1"/>
      <stop offset="65%" style="stop-color:#282828;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:1"/>
    </radialGradient>
    
    <!-- ===== PROMINENT PERANAKAN GRID PATTERN ===== -->
    <pattern id="peranakan_integrated" patternUnits="userSpaceOnUse" width="20" height="20">
      <!-- Octagon (main element) -->
      <polygon points="10,3 17,6 17,14 10,17 3,14 3,6" 
               fill="none" stroke="#404040" stroke-width="0.4" opacity="0.55"/>
      <!-- Center circle -->
      <circle cx="10" cy="10" r="3" fill="none" stroke="#3a3a3a" stroke-width="0.3" opacity="0.45"/>
      <!-- Crossing lines -->
      <line x1="10" y1="2" x2="10" y2="18" stroke="#3a3a3a" stroke-width="0.2" opacity="0.35"/>
      <line x1="2" y1="10" x2="18" y2="10" stroke="#3a3a3a" stroke-width="0.2" opacity="0.35"/>
    </pattern>
    
    <!-- ===== HORIZONTAL GRAIN (v6 style) ===== -->
    <pattern id="grain" x="0" y="0" width="142.24" height="0.2" patternUnits="userSpaceOnUse">
      <rect width="142.24" height="0.2" fill="#1a1a1a"/>
      <rect y="0.100" width="142.24" height="0.050" fill="#2a2a2a" opacity="0.4"/>
    </pattern>
    
    <!-- ===== JACK GRADIENT ===== -->
    <radialGradient id="jackMatte" cx="40%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#888888;stop-opacity:1"/>
      <stop offset="35%" style="stop-color:#606060;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#404040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1"/>
    </radialGradient>
  </defs>
  
