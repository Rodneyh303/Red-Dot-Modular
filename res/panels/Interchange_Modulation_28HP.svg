<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 142.24 380" width="142.24mm" height="380mm">
  <defs>
    <!-- ===== VISIBLE PERANAKAN GRID PATTERN ===== -->
    <pattern id="peranakan_grid" patternUnits="userSpaceOnUse" width="20" height="20">
      <!-- Make it visible: lighter gray -->
      <polygon points="10,3 17,6 17,14 10,17 3,14 3,6" 
               fill="none" stroke="#555555" stroke-width="0.5" opacity="0.7"/>
      <circle cx="10" cy="10" r="3" fill="none" stroke="#555555" stroke-width="0.4" opacity="0.6"/>
      <line x1="10" y1="2" x2="10" y2="18" stroke="#555555" stroke-width="0.3" opacity="0.5"/>
      <line x1="2" y1="10" x2="18" y2="10" stroke="#555555" stroke-width="0.3" opacity="0.5"/>
    </pattern>
    
    <!-- ===== HORIZONTAL GRAIN ===== -->
    <pattern id="grain" x="0" y="0" width="142.24" height="0.2" patternUnits="userSpaceOnUse">
      <rect width="142.24" height="0.2" fill="#1a1a1a"/>
      <rect y="0.100" width="142.24" height="0.050" fill="#2a2a2a" opacity="0.4"/>
    </pattern>
  </defs>
  
  <!-- ===== BACKGROUND ===== -->
  <rect width="142.24" height="380" fill="#1a1a1a"/>
  <!-- VISIBLE PERANAKAN PATTERN -->
  <rect width="142.24" height="380" fill="url(#peranakan_grid)"/>
  <!-- Grain overlay -->
  <rect width="142.24" height="380" fill="url(#grain)"/>
  
  <!-- ===== BORDER ===== -->
  <rect x="0.5" y="0.5" width="141.24" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  
  <!-- ===== RED LINE ACCENT ===== -->
  <rect x="0" y="0" width="2.5" height="380" fill="#dc2626"/>
  
  <!-- ===== HEADER ===== -->
  <rect x="0" y="0" width="142.24" height="16" fill="#0f0f0f"/>
  <line x1="2" y1="16" x2="140.24" y2="16" stroke="#2a2a2a" stroke-width="0.5"/>
  
  <!-- RED DOT -->
  <circle cx="10" cy="8" r="3" fill="#cc2222" stroke="#990000" stroke-width="0.2"/>
  
  <!-- TITLE -->
  <text x="71.12" y="13" font-size="7.5" font-family="monospace" text-anchor="middle" fill="#e4e4e7" font-weight="bold">INTERCHANGE</text>
  
  <!-- ===== COLUMN HEADERS ===== -->
  <text x="40" y="38" font-size="5" font-family="monospace" text-anchor="middle" fill="#b8860b" font-weight="bold">left</text>
  <text x="102" y="38" font-size="5" font-family="monospace" text-anchor="middle" fill="#b8860b" font-weight="bold">right</text>
  
  <text x="22" y="48" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">jack</text>
  <text x="40" y="48" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">atten</text>
  
  <text x="84" y="48" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">jack</text>
  <text x="102" y="48" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">atten</text>
  
  <!-- ===== CONTROL GRID (7 rows, stretched vertically) ===== -->
  <!-- Y positions: 65, 100, 135, 170, 205, 240, 275 (35mm spacing) -->
  
  <!-- ROW 1: C / F# (Y=65) -->
  <text x="8" y="70" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">1 C</text>
  <circle cx="22" cy="65" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="65" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="70" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">7 F#</text>
  <circle cx="84" cy="65" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="65" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ROW 2: C# / G (Y=100) -->
  <text x="8" y="105" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">2 C#</text>
  <circle cx="22" cy="100" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="100" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="105" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">8 G</text>
  <circle cx="84" cy="100" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="100" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ROW 3: D / G# (Y=135) -->
  <text x="8" y="140" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">3 D</text>
  <circle cx="22" cy="135" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="135" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="140" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">9 G#</text>
  <circle cx="84" cy="135" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="135" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ROW 4: D# / A (Y=170) -->
  <text x="8" y="175" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">4 D#</text>
  <circle cx="22" cy="170" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="170" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="175" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">10 A</text>
  <circle cx="84" cy="170" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="170" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ROW 5: E / A# (Y=205) -->
  <text x="8" y="210" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">5 E</text>
  <circle cx="22" cy="205" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="205" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="210" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">11 A#</text>
  <circle cx="84" cy="205" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="205" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ROW 6: F / B (Y=240) -->
  <text x="8" y="245" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">6 F</text>
  <circle cx="22" cy="240" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="240" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="245" font-size="4" font-family="monospace" text-anchor="middle" fill="#666" font-weight="bold">12 B</text>
  <circle cx="84" cy="240" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="240" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ROW 7: OCT LO / OCT HI (Y=275) -->
  <line x1="2" y1="258" x2="140.24" y2="258" stroke="#2a2a2a" stroke-width="0.5"/>
  
  <text x="8" y="285" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">Oct Lo</text>
  <circle cx="22" cy="275" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="275" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <text x="66" y="285" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888" font-weight="bold">Oct Hi</text>
  <circle cx="84" cy="275" r="3" fill="none" stroke="#888" stroke-width="0.5"/>
  <circle cx="102" cy="275" r="2" fill="none" stroke="#888" stroke-width="0.4"/>
  
  <!-- ===== LEGEND ===== -->
  <text x="71.12" y="330" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#666">○ = Jack placement</text>
  <text x="71.12" y="342" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#666">◯ = Attenuverter placement</text>
  
</svg>
