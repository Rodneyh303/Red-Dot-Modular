  <rect width="142.24" height="380" fill="url(#peranakan_integrated)"/>
  <!-- Grain overlay -->
  <rect width="142.24" height="380" fill="url(#grain)"/>
  
  <!-- ===== PANEL BORDER ===== -->
  <rect x="0.5" y="0.5" width="141.24" height="379" fill="none" stroke="#0a0a0a" stroke-width="1"/>
  
