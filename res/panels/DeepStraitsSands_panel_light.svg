<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- 
  DeepStraitsSands - Per-Voice DNA Control (Detailed)
  Light Theme Panel (280mm width, ~55 HP)
  
  15-Voice Grid Layout:
    • Column 1: Voice # labels (1-15)
    • Columns 2-4: Rest DNA (Len/Off/Rot knobs)
    • Columns 5-7: Melody DNA (Len/Off/Rot knobs)
    • Columns 8-10: Octave DNA (Len/Off/Rot knobs)
    • Columns 11-13: Interpolation (Rest/Melody/Octave sliders)
    • Column 14: Buttons (Scramble/Reset per row)
    • Column 15: Gates (Scramble/Reset inputs per row)
    
  Total: 15 rows × 15 columns = 180+ controls
  
  Peranakan lattice pattern rendered by C++ (not in SVG)
  This SVG provides: Background, voice labels, component guides, organization
-->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 380">
  <defs>
    <linearGradient id="panelEdgeLtGradient280" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  
  <!-- PANEL BACKGROUND (Light Theme) -->
  <rect width="280" height="380" fill="#e6e6e6"/>
  
  <!-- Edge Highlight -->
  <rect width="280" height="380" fill="url(#panelEdgeLtGradient280)" opacity="0.8"/>
  
  <!-- ============================================================================
       HEADER / BRANDING
       ============================================================================ -->
  
  <text x="140" y="18" font-size="12" font-weight="bold" font-family="monospace" 
        text-anchor="middle" fill="#232323" letter-spacing="1">
    DEEP STRAITS SANDS
  </text>
  
  <text x="140" y="30" font-size="8" font-family="monospace" 
        text-anchor="middle" fill="#666" letter-spacing="0.5">
    per-voice dna control
  </text>
  
  <!-- Brand Accent (Red Dot) -->
  <circle cx="270" cy="10" r="2.5" fill="#dc2626"/>
  
  <!-- ============================================================================
       COLUMN HEADERS
       ============================================================================ -->
  
  <!-- Voice # header -->
  <text x="8" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#232323" font-weight="bold">V</text>
  
  <!-- Rest DNA header -->
  <text x="30" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#232323" font-weight="bold">REST</text>
  
  <!-- Melody DNA header -->
  <text x="95" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#232323" font-weight="bold">MELODY</text>
  
  <!-- Octave DNA header -->
  <text x="160" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#232323" font-weight="bold">OCTAVE</text>
  
  <!-- Interpolation header -->
  <text x="215" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#232323" font-weight="bold">INTERP</text>
  
  <!-- Control header -->
  <text x="260" y="45" font-size="6" font-family="monospace" text-anchor="middle" 
        fill="#232323" font-weight="bold">CTL</text>
  
  <!-- Sub-headers for DNA windows (Len/Off/Rot) -->
  <text x="20" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">L</text>
  <text x="30" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">O</text>
  <text x="40" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">R</text>
  
  <text x="85" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">L</text>
  <text x="95" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">O</text>
  <text x="105" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">R</text>
  
  <text x="150" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">L</text>
  <text x="160" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">O</text>
  <text x="170" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">R</text>
  
  <!-- Sub-headers for Interpolation (R/M/O) -->
  <text x="205" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">R</text>
  <text x="215" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">M</text>
  <text x="225" y="52" font-size="5" font-family="monospace" text-anchor="middle" fill="#999">O</text>
  
  <!-- ============================================================================
       VOICE ROWS (1-15)
       ============================================================================ -->
  
  <!-- Row template (repeated 15 times with Y = 60 + (row_index * 11)) -->
  <!-- Voice 1 -->
  <g id="voice1_row">
    <line x1="2" y1="60" x2="278" y2="60" stroke="#ddd" stroke-width="0.3"/>
    <text x="8" y="65" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">1</text>
    
    <!-- Rest DNA knobs (guide circles) -->
    <circle cx="20" cy="63" r="3.5" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="30" cy="63" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="40" cy="63" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Melody DNA knobs -->
    <circle cx="85" cy="63" r="3.5" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="95" cy="63" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="105" cy="63" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Octave DNA knobs -->
    <circle cx="150" cy="63" r="3.5" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="160" cy="63" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="170" cy="63" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Interpolation sliders (vertical) -->
    <rect x="202" y="56" width="6" height="14" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="1,1" opacity="0.6"/>
    <rect x="212" y="56" width="6" height="14" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="1,1" opacity="0.6"/>
    <rect x="222" y="56" width="6" height="14" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="1,1" opacity="0.6"/>
    
    <!-- Scramble/Reset buttons -->
    <rect x="245" y="59" width="5" height="5" rx="0.8" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <rect x="260" y="59" width="5" height="5" rx="0.8" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    
    <!-- Gate inputs -->
    <circle cx="245" cy="68" r="2" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
    <circle cx="260" cy="68" r="2" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
  </g>
  
  <!-- Voice 2-15 rows (generated with Y offset) -->
  <g id="voice2_row" transform="translate(0, 11)"><use xlink:href="#voice1_row"/></g>
  <g id="voice3_row" transform="translate(0, 22)"><use xlink:href="#voice1_row"/></g>
  <g id="voice4_row" transform="translate(0, 33)"><use xlink:href="#voice1_row"/></g>
  <g id="voice5_row" transform="translate(0, 44)"><use xlink:href="#voice1_row"/></g>
  <g id="voice6_row" transform="translate(0, 55)"><use xlink:href="#voice1_row"/></g>
  <g id="voice7_row" transform="translate(0, 66)"><use xlink:href="#voice1_row"/></g>
  <g id="voice8_row" transform="translate(0, 77)"><use xlink:href="#voice1_row"/></g>
  <g id="voice9_row" transform="translate(0, 88)"><use xlink:href="#voice1_row"/></g>
  <g id="voice10_row" transform="translate(0, 99)"><use xlink:href="#voice1_row"/></g>
  <g id="voice11_row" transform="translate(0, 110)"><use xlink:href="#voice1_row"/></g>
  <g id="voice12_row" transform="translate(0, 121)"><use xlink:href="#voice1_row"/></g>
  <g id="voice13_row" transform="translate(0, 132)"><use xlink:href="#voice1_row"/></g>
  <g id="voice14_row" transform="translate(0, 143)"><use xlink:href="#voice1_row"/></g>
  <g id="voice15_row" transform="translate(0, 154)"><use xlink:href="#voice1_row"/></g>
  
  <!-- Manual voice number labels (override template for clarity) -->
  <text x="8" y="185" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">2</text>
  <text x="8" y="196" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">3</text>
  <text x="8" y="207" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">4</text>
  <text x="8" y="218" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">5</text>
  <text x="8" y="229" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">6</text>
  <text x="8" y="240" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">7</text>
  <text x="8" y="251" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">8</text>
  <text x="8" y="262" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">9</text>
  <text x="8" y="273" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">10</text>
  <text x="8" y="284" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">11</text>
  <text x="8" y="295" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">12</text>
  <text x="8" y="306" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">13</text>
  <text x="8" y="317" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">14</text>
  <text x="8" y="328" font-size="6" font-family="monospace" text-anchor="middle" fill="#666">15</text>
  
  <!-- ============================================================================
       MASTER CONTROLS (Bottom)
       ============================================================================ -->
  
  <!-- Separator line -->
  <line x1="2" y1="335" x2="278" y2="335" stroke="#ddd" stroke-width="0.8"/>
  
  <!-- Master label -->
  <text x="8" y="350" font-size="6" font-family="monospace" text-anchor="middle" fill="#232323" font-weight="bold">
    MASTER
  </text>
  
  <!-- Master Scramble All button -->
  <rect x="30" y="345" width="8" height="8" rx="1" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="34" y="362" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scramble-all</text>
  
  <!-- Master Reset All button -->
  <rect x="95" y="345" width="8" height="8" rx="1" fill="none" stroke="#ccc" stroke-width="0.4" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="99" y="362" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">reset-all</text>
  
  <!-- Master gate inputs -->
  <circle cx="160" cy="349" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="160" y="366" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">scr-gate</text>
  
  <circle cx="225" cy="349" r="3" fill="none" stroke="#ccc" stroke-width="0.3" stroke-dasharray="2,1" opacity="0.6"/>
  <text x="225" y="366" font-size="5" font-family="monospace" text-anchor="middle" fill="#666">rst-gate</text>
  
  <!-- ============================================================================
       FOOTER & BRANDING
       ============================================================================ -->
  
  <text x="140" y="378" font-size="5" font-family="monospace" text-anchor="middle" fill="#aaa" letter-spacing="1">
    red dot | deep straits sands
  </text>
</svg>
