<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 121.92 380">
  <rect width="121.92" height="380" fill="#e6e6e6"/>
  <rect x="0.5" y="0.5" width="120.92" height="379" fill="none" stroke="#ccc" stroke-width="0.8"/>
  
  <!-- HEADER -->
  <rect x="0" y="0" width="121.92" height="16" fill="#d0d0d0"/>
  <line x1="2" y1="16" x2="119.92" y2="16" stroke="#999" stroke-width="0.5"/>
  
  <!-- RED DOT -->
  <circle cx="10" cy="8" r="3" fill="#dc2626"/>
  
  <!-- TITLE -->
  <text x="60.96" y="13" font-size="7" font-family="monospace" text-anchor="middle" fill="#333" font-weight="bold">INTERCHANGE</text>
  <text x="60.96" y="25" font-size="4" font-family="monospace" text-anchor="middle" fill="#666">modulation</text>
  
  <!-- MODE SELECTOR -->
  <text x="15" y="45" font-size="5" font-family="monospace" fill="#777">mode</text>
  <rect x="20" y="50" width="25" height="8" rx="1" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  
  <!-- SCALE SELECTOR (large knob) -->
  <circle cx="80" cy="60" r="8" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="80" y="77" font-size="4" font-family="monospace" text-anchor="middle" fill="#888">scale</text>
  
  <!-- VOICE GRID SECTION -->
  <text x="15" y="105" font-size="5" font-family="monospace" fill="#777" font-weight="bold">voices</text>
  <line x1="2" y1="110" x2="119.92" y2="110" stroke="#d0d0d0" stroke-width="0.5"/>
  
  <!-- 8 voice rows with per-voice controls -->
  <!-- Voice 1 -->
  <text x="8" y="130" font-size="4" font-family="monospace" fill="#888">1</text>
  <circle cx="25" cy="125" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="40" cy="125" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="55" cy="125" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="70" cy="125" r="4" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="95" cy="125" r="4" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
  
  <!-- Voice 2 -->
  <text x="8" y="150" font-size="4" font-family="monospace" fill="#888">2</text>
  <circle cx="25" cy="145" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="40" cy="145" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="55" cy="145" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="70" cy="145" r="4" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="95" cy="145" r="4" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
  
  <!-- Voice 3 -->
  <text x="8" y="170" font-size="4" font-family="monospace" fill="#888">3</text>
  <circle cx="25" cy="165" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="40" cy="165" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="55" cy="165" r="3.5" fill="none" stroke="#bbb" stroke-width="0.3" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="70" cy="165" r="4" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
  <circle cx="95" cy="165" r="4" fill="none" stroke="#bbb" stroke-width="0.35" stroke-dasharray="1.5,1" opacity="0.6"/>
  
  <!-- Voice 4-8 (abbreviated) -->
  <text x="8" y="190" font-size="4" font-family="monospace" fill="#888">4-8</text>
  <text x="60.96" y="190" font-size="3" font-family="monospace" text-anchor="middle" fill="#aaa">[similar layout]</text>
  
  <!-- MASTER CONTROLS -->
  <line x1="2" y1="340" x2="119.92" y2="340" stroke="#d0d0d0" stroke-width="0.5"/>
  <text x="15" y="355" font-size="5" font-family="monospace" fill="#777">master</text>
  
  <rect x="30" y="360" width="18" height="8" rx="1" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="39" y="373" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">quant</text>
  
  <circle cx="90" cy="364" r="4" fill="none" stroke="#bbb" stroke-width="0.4" stroke-dasharray="1.5,1" opacity="0.7"/>
  <text x="90" y="375" font-size="3.5" font-family="monospace" text-anchor="middle" fill="#888">out</text>
  
</svg>
